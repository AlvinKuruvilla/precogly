name: Deploy Documentation

# Only runs when docs-related files change on main
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

# Allow only one deployment at a time
concurrency:
  group: docs-deploy
  cancel-in-progress: true

# Need write access to push to gh-pages branch
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the repo
      - uses: actions/checkout@v4

      # 2. Set up Python
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Install mkdocs-material from docs/requirements.txt
      - run: pip install -r docs/requirements.txt

      # 4. Build and deploy to gh-pages branch
      - run: mkdocs gh-deploy --force
