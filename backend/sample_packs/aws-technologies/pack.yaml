# =============================================================================
# AWS TECHNOLOGIES PACK
# =============================================================================
# AWS cloud services with associated threats and countermeasures.

pack:
  slug: aws-technologies
  name: "AWS Technologies Pack"
  description: "AWS cloud services, threats, and security controls"
  version: "1.0.0"
  author: "Precogly Team"
  pack_type: full
  tier: free
  source: official
  industries:
    - technology
    - fintech
    - healthcare
    - retail
  tags:
    - aws
    - cloud
    - infrastructure
  repository_url: "https://github.com/precogly/packs/aws-technologies"
  documentation_url: "https://docs.precogly.dev/packs/aws-technologies"
  depends_on:
    - pack: base-stride
      version: "^1.0.0"

# =============================================================================
# COMPONENTS (with nested threats and countermeasures)
# =============================================================================

components:
  # ---------------------------------------------------------------------------
  # Compute
  # ---------------------------------------------------------------------------
  - slug: ec2
    name: "AWS EC2"
    category: process
    component_type: "Virtual Machine"
    provider: aws

    threats:
      - slug: ec2-instance-compromise
        name: "EC2 Instance Compromise"
        description: "Unauthorized access to EC2 instances through vulnerabilities or misconfigurations"
        stride_category: elevation_of_privilege
        severity: high

        countermeasures:
          - slug: ec2-security-groups
            name: "Security Group Configuration"
            description: "Properly configured security groups with least privilege"
            control_type: technical
            cost: low

          - slug: ec2-ssm-patching
            name: "Automated Patching via SSM"
            description: "Use AWS Systems Manager for automated patching"
            control_type: technical
            cost: medium

      - slug: ec2-metadata-exposure
        name: "Instance Metadata Exposure"
        description: "SSRF attacks accessing EC2 instance metadata"
        stride_category: information_disclosure
        severity: high

        countermeasures:
          - slug: imdsv2-enforcement
            name: "IMDSv2 Enforcement"
            description: "Require IMDSv2 to prevent SSRF-based metadata access"
            control_type: technical
            cost: low

  - slug: lambda
    name: "AWS Lambda"
    category: process
    component_type: "Serverless Function"
    provider: aws

    threats:
      - slug: lambda-code-injection
        name: "Lambda Code Injection"
        description: "Injecting malicious code through function inputs"
        stride_category: tampering
        severity: high

        countermeasures:
          - slug: lambda-input-validation
            name: "Lambda Input Validation"
            description: "Validate all function inputs before processing"
            control_type: technical
            cost: low

      - slug: lambda-iam-abuse
        name: "Lambda IAM Role Abuse"
        description: "Exploiting overly permissive Lambda execution roles"
        stride_category: elevation_of_privilege
        severity: critical

        countermeasures:
          - slug: lambda-least-privilege
            name: "Lambda Least Privilege IAM"
            description: "Assign minimal required permissions to Lambda roles"
            control_type: technical
            cost: low

  # ---------------------------------------------------------------------------
  # Storage
  # ---------------------------------------------------------------------------
  - slug: s3
    name: "AWS S3"
    category: datastore
    component_type: "Object Storage"
    provider: aws

    threats:
      - slug: s3-data-breach
        name: "S3 Data Breach"
        description: "Unauthorized access to S3 bucket contents"
        stride_category: information_disclosure
        severity: critical

        countermeasures:
          - slug: s3-block-public-access
            name: "S3 Block Public Access"
            description: "Enable S3 Block Public Access at account level"
            control_type: technical
            cost: low

          - slug: s3-bucket-policy
            name: "S3 Bucket Policy"
            description: "Properly configured bucket policies with least privilege"
            control_type: technical
            cost: low

          - slug: s3-encryption
            name: "S3 Server-Side Encryption"
            description: "Enable SSE-S3 or SSE-KMS for all objects"
            control_type: technical
            cost: low

      - slug: s3-data-exfiltration
        name: "S3 Data Exfiltration"
        description: "Unauthorized bulk download of S3 data"
        stride_category: information_disclosure
        severity: high

        countermeasures:
          - slug: s3-access-logging
            name: "S3 Access Logging"
            description: "Enable S3 access logging to CloudTrail"
            control_type: technical
            cost: low

  - slug: rds
    name: "AWS RDS"
    category: datastore
    component_type: "Managed Database"
    provider: aws

    threats:
      - slug: rds-sql-injection
        name: "RDS SQL Injection"
        description: "SQL injection attacks against RDS databases"
        stride_category: tampering
        severity: critical

        countermeasures:
          - slug: rds-parameterized-queries
            name: "Parameterized Queries"
            description: "Use parameterized queries/prepared statements"
            control_type: technical
            cost: low

      - slug: rds-unauthorized-access
        name: "RDS Unauthorized Access"
        description: "Unauthorized access to RDS instances"
        stride_category: information_disclosure
        severity: high

        countermeasures:
          - slug: rds-security-groups
            name: "RDS Security Groups"
            description: "Restrict RDS access to specific security groups"
            control_type: technical
            cost: low

          - slug: rds-encryption
            name: "RDS Encryption"
            description: "Enable encryption at rest for RDS instances"
            control_type: technical
            cost: medium

  # ---------------------------------------------------------------------------
  # Networking
  # ---------------------------------------------------------------------------
  - slug: api-gateway
    name: "AWS API Gateway"
    category: process
    component_type: "API Gateway"
    provider: aws

    threats:
      - slug: api-gateway-abuse
        name: "API Gateway Abuse"
        description: "Abuse of API endpoints through excessive requests"
        stride_category: denial_of_service
        severity: medium

        countermeasures:
          - slug: api-gateway-throttling
            name: "API Gateway Throttling"
            description: "Configure usage plans and throttling limits"
            control_type: technical
            cost: low

      - slug: api-gateway-auth-bypass
        name: "API Gateway Auth Bypass"
        description: "Bypassing API Gateway authentication"
        stride_category: spoofing
        severity: critical

        countermeasures:
          - slug: api-gateway-authorizer
            name: "API Gateway Authorizer"
            description: "Use Lambda or Cognito authorizers"
            control_type: technical
            cost: medium

  - slug: alb
    name: "AWS Application Load Balancer"
    category: process
    component_type: "Load Balancer"
    provider: aws

    threats:
      - slug: alb-ddos
        name: "ALB DDoS Attack"
        description: "Distributed denial of service targeting ALB"
        stride_category: denial_of_service
        severity: high

        countermeasures:
          - slug: alb-waf
            name: "AWS WAF Integration"
            description: "Enable AWS WAF with rate-based rules"
            control_type: technical
            cost: medium

          - slug: alb-shield
            name: "AWS Shield Protection"
            description: "Enable AWS Shield for DDoS protection"
            control_type: technical
            cost: high

  # ---------------------------------------------------------------------------
  # Security
  # ---------------------------------------------------------------------------
  - slug: cognito
    name: "AWS Cognito"
    category: process
    component_type: "Identity Provider"
    provider: aws

    threats:
      - slug: cognito-account-takeover
        name: "Cognito Account Takeover"
        description: "Unauthorized access to user accounts"
        stride_category: spoofing
        severity: critical

        countermeasures:
          - slug: cognito-mfa
            name: "Cognito MFA"
            description: "Enforce multi-factor authentication"
            control_type: technical
            cost: low

          - slug: cognito-advanced-security
            name: "Cognito Advanced Security"
            description: "Enable advanced security features (adaptive auth)"
            control_type: technical
            cost: medium

  - slug: kms
    name: "AWS KMS"
    category: process
    component_type: "Key Management"
    provider: aws

    threats:
      - slug: kms-key-compromise
        name: "KMS Key Compromise"
        description: "Unauthorized access to KMS encryption keys"
        stride_category: information_disclosure
        severity: critical

        countermeasures:
          - slug: kms-key-policy
            name: "KMS Key Policy"
            description: "Properly configured key policies with least privilege"
            control_type: technical
            cost: low

          - slug: kms-key-rotation
            name: "KMS Key Rotation"
            description: "Enable automatic key rotation"
            control_type: technical
            cost: low

# =============================================================================
# STANDALONE COUNTERMEASURES (AWS-wide)
# =============================================================================

countermeasures:
  - slug: cloudtrail-logging
    name: "CloudTrail Logging"
    description: "Enable CloudTrail for all AWS API activity"
    control_type: technical
    cost: low
    applicable_threats:
      - base-stride/repudiation-of-actions  # Cross-pack reference
      - base-stride/log-tampering

  - slug: guardduty-monitoring
    name: "GuardDuty Threat Detection"
    description: "Enable GuardDuty for continuous threat monitoring"
    control_type: technical
    cost: medium
    applicable_threats:
      - ec2-instance-compromise
      - s3-data-exfiltration
      - cognito-account-takeover

  - slug: iam-best-practices
    name: "IAM Best Practices"
    description: "Follow AWS IAM best practices (MFA, least privilege, no root)"
    control_type: procedural
    cost: low
    applicable_threats:
      - base-stride/privilege-escalation
      - lambda-iam-abuse

# =============================================================================
# COMPLIANCE STANDARDS MAPPING
# =============================================================================

standards:
  - countermeasure: s3-encryption
    requirement: soc2-cc6.1
    sufficiency: partial

  - countermeasure: cloudtrail-logging
    requirement: soc2-cc7.2
    sufficiency: full

  - countermeasure: cognito-mfa
    requirement: soc2-cc6.1
    sufficiency: partial
