site_name: Precogly Documentation
site_description: Documentation for Precogly — the open-source threat modeling platform
site_url: https://precogly.github.io/precogly
repo_url: https://github.com/precogly/precogly
repo_name: precogly/precogly

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
  - Concepts:
      - Library Packs: concepts/library-packs.md
      - DFD Editor: concepts/dfd-editor.md
      - Threat Analysis: concepts/threat-analysis.md
      - Threat Model as Code: concepts/threat-model-as-code.md
      - Zone Protections: concepts/zone-protections.md
      - Platform Controls: concepts/platform-controls.md
      - Completion Status: concepts/completion-status.md
      - Reference Images: concepts/reference-images.md
      - Org Hierarchy: concepts/org-hierarchy.md
      - Roles and Permissions: concepts/roles-and-permissions.md
      - Magic Links: concepts/magic-links.md
  - Guides:
      - Creating a Threat Model: guides/creating-threat-model.md
      - Importing & Exporting: guides/importing-exporting.md
      - Compliance Mapping: guides/compliance-mapping.md
  - API:
      - Overview: api/overview.md
  - Contributing:
      - Development Setup: contributing/development-setup.md
      - Creating Library Packs: contributing/creating-library-packs.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
