mappings:
  # S3 Threat → Countermeasure mappings
  - threat: s3-public-exposure
    countermeasures:
      - s3-block-public-access
      - s3-bucket-policy
      - s3-access-logging

  - threat: s3-data-tampering
    countermeasures:
      - s3-versioning
      - s3-encryption
      - s3-bucket-policy

  - threat: s3-deletion
    countermeasures:
      - s3-versioning
      - s3-mfa-delete
      - s3-bucket-policy

  # Lambda Threat → Countermeasure mappings
  - threat: lambda-injection
    countermeasures:
      - lambda-input-validation
      - lambda-vpc
      - lambda-code-signing

  - threat: lambda-privilege-escalation
    countermeasures:
      - lambda-least-privilege

  - threat: lambda-secret-exposure
    countermeasures:
      - lambda-secrets-manager
      - lambda-vpc

  - threat: lambda-dos
    countermeasures:
      - lambda-reserved-concurrency
      - apigw-throttling

  # API Gateway Threat → Countermeasure mappings
  - threat: apigw-unauthorized-access
    countermeasures:
      - apigw-cognito-auth
      - apigw-api-key
      - apigw-waf

  - threat: apigw-injection
    countermeasures:
      - apigw-waf
      - apigw-request-validation
      - lambda-input-validation

  - threat: apigw-rate-limit-bypass
    countermeasures:
      - apigw-throttling
      - apigw-waf
      - apigw-api-key

  - threat: apigw-logging-gap
    countermeasures:
      - apigw-cloudwatch-logging

  # DynamoDB Threat → Countermeasure mappings
  - threat: dynamodb-unauthorized-access
    countermeasures:
      - dynamodb-fine-grained-access
      - dynamodb-encryption
      - dynamodb-vpc-endpoint

  - threat: dynamodb-injection
    countermeasures:
      - lambda-input-validation
      - dynamodb-fine-grained-access

  - threat: dynamodb-capacity-exhaustion
    countermeasures:
      - apigw-throttling
      - dynamodb-pitr

  # SQS Threat → Countermeasure mappings
  - threat: sqs-message-tampering
    countermeasures:
      - sqs-encryption
      - sqs-queue-policy

  - threat: sqs-message-injection
    countermeasures:
      - sqs-queue-policy
      - sqs-message-validation
      - sqs-dlq

  - threat: sqs-queue-flooding
    countermeasures:
      - sqs-queue-policy
      - sqs-dlq
      - apigw-throttling
