template:
  slug: aws-serverless
  name: "AWS Serverless"
  description: "AWS serverless architecture with API Gateway, Lambda, S3, and WAF protection"
  category: serverless
  diagram_type: level1

canvas_data:
  nodes:
    - id: "actor-user"
      type: "humanActor"
      position: { x: 90, y: 255 }
      data:
        label: "User"
        actorType: "user"
        description: "End user uploading files"

    - id: "scope-aws-serverless"
      type: "systemScope"
      position: { x: 300, y: 45 }
      style: { width: 990, height: 785 }
      data:
        label: "AWS Serverless System"

    - id: "tb-internal"
      type: "trustZone"
      parentId: "scope-aws-serverless"
      position: { x: 390, y: 405 }
      style: { width: 485, height: 255 }
      data:
        label: "Internal"
        zoneType: "zoneInternal"
        trustLevel: "internal"

    - id: "tb-external"
      type: "trustZone"
      parentId: "scope-aws-serverless"
      position: { x: 60, y: 195 }
      style: { width: 300, height: 260 }
      data:
        label: "External"
        trustLevel: "internet"

    - id: "process-api-gateway"
      type: "process"
      parentId: "tb-internal"
      position: { x: 60, y: 15 }
      data:
        label: "API Gateway"
        component_ref: "api-gateway"
        technology: "Amazon API Gateway"

    - id: "process-lambda"
      type: "process"
      parentId: "tb-internal"
      position: { x: 165, y: 120 }
      data:
        label: "Lambda"
        component_ref: "lambda"
        technology: "AWS Lambda"
        dataSensitivity: "confidential"

    - id: "datastore-s3"
      type: "datastore"
      parentId: "tb-internal"
      position: { x: 345, y: 75 }
      data:
        label: "S3 Bucket"
        component_ref: "s3"
        description: "Object storage for uploaded files"
        dataSensitivity: "confidential"

    - id: "process-waf"
      type: "process"
      parentId: "tb-external"
      position: { x: 60, y: 45 }
      data:
        label: "AWS WAF"
        dataSensitivity: "public"

  edges:
    - id: "edge-api-gw-to-user"
      source: "process-api-gateway"
      target: "actor-user"
      type: "dataFlow"
      data:
        label: ""
        encrypted: false
        authenticated: false

    - id: "edge-lambda-to-s3"
      source: "process-lambda"
      target: "datastore-s3"
      type: "dataFlow"
      data:
        label: ""
        encrypted: false
        authenticated: false

    - id: "edge-s3-to-lambda"
      source: "datastore-s3"
      target: "process-lambda"
      type: "dataFlow"
      data:
        label: ""
        encrypted: false
        authenticated: false

    - id: "edge-lambda-to-api-gw"
      source: "process-lambda"
      target: "process-api-gateway"
      type: "dataFlow"
      data:
        label: ""
        encrypted: false
        authenticated: false

    - id: "edge-user-to-waf"
      source: "actor-user"
      target: "process-waf"
      type: "dataFlow"
      data:
        label: ""
        encrypted: false
        authenticated: false

    - id: "edge-api-gw-to-waf"
      source: "process-api-gateway"
      target: "process-waf"
      type: "dataFlow"
      data:
        label: ""
        encrypted: false
        authenticated: false

    - id: "edge-waf-to-api-gw"
      source: "process-waf"
      target: "process-api-gateway"
      type: "dataFlow"
      data:
        label: ""
        encrypted: false
        authenticated: false

    - id: "edge-api-gw-to-lambda"
      source: "process-api-gateway"
      target: "process-lambda"
      type: "dataFlow"
      data:
        label: ""
        encrypted: false
        authenticated: false
