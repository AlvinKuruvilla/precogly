template:
  slug: swift-payments
  name: "SWIFT International Payments"
  description: "Cross-border payment processing via SWIFT network with sanctions screening and core banking integration"
  category: api
  diagram_type: level1

canvas_data:
  nodes:
    # External actors
    - id: "actor-correspondent"
      type: "actor"
      position: { x: 50, y: 150 }
      data:
        label: "Correspondent Bank"
        description: "Partner bank initiating/receiving SWIFT messages"

    - id: "actor-swiftnet"
      type: "actor"
      position: { x: 50, y: 300 }
      data:
        label: "SWIFTNet"
        description: "SWIFT secure messaging network"

    # Trust boundary - Processing Zone
    - id: "tb-processing"
      type: "trustBoundary"
      position: { x: 200, y: 80 }
      style: { width: 500, height: 400 }
      data:
        label: "Payment Processing Zone"
        trustLevel: "privateSecured"

    # Core processes
    - id: "process-gateway"
      type: "process"
      position: { x: 250, y: 150 }
      data:
        label: "SWIFT Gateway"
        technology: "SWIFT Alliance Lite2"
        description: "SWIFT messaging gateway with HSM"

    - id: "process-validation"
      type: "process"
      position: { x: 450, y: 150 }
      data:
        label: "Message Validation"
        technology: "Azure Functions"
        description: "SWIFT message format validation (MT/MX)"

    - id: "process-sanctions"
      type: "process"
      position: { x: 450, y: 280 }
      data:
        label: "Sanctions Screening"
        technology: "Fircosoft"
        description: "AML/KYC checks against OFAC, EU, UN lists"

    - id: "process-core-banking"
      type: "process"
      position: { x: 650, y: 220 }
      data:
        label: "Core Banking"
        technology: "Temenos T24"
        description: "General ledger and account updates"

    # Data stores
    - id: "datastore-payments"
      type: "datastore"
      position: { x: 250, y: 380 }
      data:
        label: "Payment Messages DB"
        technology: "Azure SQL"
        description: "Transaction records and payment status"

    - id: "datastore-audit"
      type: "datastore"
      position: { x: 450, y: 380 }
      data:
        label: "Audit Log"
        technology: "Azure Monitor"
        description: "Immutable audit trail"

  edges:
    - id: "edge-1"
      source: "actor-correspondent"
      target: "process-gateway"
      type: "dataFlow"
      data:
        label: "Payment Instructions"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-2"
      source: "actor-swiftnet"
      target: "process-gateway"
      type: "dataFlow"
      data:
        label: "MT103/MT202"
        protocol: "SWIFTNet"
        encrypted: true

    - id: "edge-3"
      source: "process-gateway"
      target: "process-validation"
      type: "dataFlow"
      data:
        label: "Raw Messages"
        protocol: "AMQP"
        encrypted: true

    - id: "edge-4"
      source: "process-validation"
      target: "process-sanctions"
      type: "dataFlow"
      data:
        label: "Validated Messages"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-5"
      source: "process-sanctions"
      target: "process-core-banking"
      type: "dataFlow"
      data:
        label: "Cleared Payments"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-6"
      source: "process-gateway"
      target: "datastore-payments"
      type: "dataFlow"
      data:
        label: "Store Messages"
        protocol: "SQL/TLS"
        encrypted: true

    - id: "edge-7"
      source: "process-core-banking"
      target: "datastore-audit"
      type: "dataFlow"
      data:
        label: "Audit Events"
        protocol: "HTTPS"
        encrypted: true
