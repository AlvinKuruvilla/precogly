template:
  slug: mobile-banking
  name: "Mobile Banking Application"
  description: "Mobile banking app with authentication, account management, and payment features"
  category: mobile
  diagram_type: level1

canvas_data:
  nodes:
    # External actor (outside all boundaries)
    - id: "actor-user"
      type: "actor"
      position: { x: 50, y: 250 }
      data:
        label: "Mobile User"
        actorType: "user"
        description: "Customer using iOS/Android app"

    # System boundary - Mobile Banking System
    - id: "sb-banking"
      type: "systemScope"
      position: { x: 180, y: 50 }
      style: { width: 820, height: 550 }
      data:
        label: "Mobile Banking System"
        owner: "Digital Banking Team"
        classification: "Production"

    # Trust boundary - Mobile Device (inside sb-banking)
    - id: "tb-mobile"
      type: "trustBoundary"
      parentId: "sb-banking"
      position: { x: 30, y: 80 }
      style: { width: 200, height: 250 }
      data:
        label: "Mobile Device"
        boundaryType: "internet"
        technology: "iOS/Android"

    # Trust boundary - Backend (inside sb-banking)
    - id: "tb-backend"
      type: "trustBoundary"
      parentId: "sb-banking"
      position: { x: 270, y: 60 }
      style: { width: 520, height: 460 }
      data:
        label: "Bank Backend"
        boundaryType: "privateSecured"
        technology: "Private Cloud"

    # Mobile app (nested inside tb-mobile)
    - id: "process-app"
      type: "process"
      parentId: "tb-mobile"
      position: { x: 40, y: 80 }
      data:
        label: "Mobile App"
        technology: "React Native"
        description: "iOS/Android banking application"

    # Backend services (nested inside tb-backend)
    - id: "process-bff"
      type: "process"
      parentId: "tb-backend"
      position: { x: 50, y: 60 }
      data:
        label: "Mobile BFF"
        technology: "Node.js"
        description: "Backend for Frontend - API gateway for mobile"

    - id: "process-auth"
      type: "process"
      parentId: "tb-backend"
      position: { x: 250, y: 60 }
      data:
        label: "Auth Service"
        technology: "OAuth 2.0 / OIDC"
        description: "Authentication with biometrics and MFA"

    - id: "process-accounts"
      type: "process"
      parentId: "tb-backend"
      position: { x: 50, y: 190 }
      data:
        label: "Account Service"
        technology: "Java / Spring"
        description: "Account balances and transactions"

    - id: "process-payments"
      type: "process"
      parentId: "tb-backend"
      position: { x: 250, y: 190 }
      data:
        label: "Payment Service"
        technology: "Java / Spring"
        description: "Fund transfers and bill payments"

    # Data stores (nested inside tb-backend)
    - id: "datastore-users"
      type: "datastore"
      parentId: "tb-backend"
      position: { x: 100, y: 320 }
      data:
        label: "Customer DB"
        technology: "PostgreSQL"
        description: "Customer profiles and credentials"
        dataSensitivity: "confidential"

    - id: "datastore-accounts"
      type: "datastore"
      parentId: "tb-backend"
      position: { x: 300, y: 320 }
      data:
        label: "Accounts DB"
        technology: "PostgreSQL"
        description: "Account balances and transactions"
        dataSensitivity: "confidential"

  edges:
    - id: "edge-1"
      source: "actor-user"
      target: "process-app"
      type: "dataFlow"
      data:
        label: "User Input"
        protocol: "Touch/Biometric"

    - id: "edge-2"
      source: "process-app"
      target: "process-bff"
      type: "dataFlow"
      data:
        label: "API Requests"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-3"
      source: "process-bff"
      target: "process-auth"
      type: "dataFlow"
      data:
        label: "Auth Requests"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-4"
      source: "process-bff"
      target: "process-accounts"
      type: "dataFlow"
      data:
        label: "Account Queries"
        protocol: "gRPC"
        encrypted: true

    - id: "edge-5"
      source: "process-bff"
      target: "process-payments"
      type: "dataFlow"
      data:
        label: "Payment Requests"
        protocol: "gRPC"
        encrypted: true

    - id: "edge-6"
      source: "process-auth"
      target: "datastore-users"
      type: "dataFlow"
      data:
        label: "User Lookup"
        protocol: "SQL/TLS"
        encrypted: true

    - id: "edge-7"
      source: "process-accounts"
      target: "datastore-accounts"
      type: "dataFlow"
      data:
        label: "Account Data"
        protocol: "SQL/TLS"
        encrypted: true

    - id: "edge-8"
      source: "process-payments"
      target: "datastore-accounts"
      type: "dataFlow"
      data:
        label: "Transaction Updates"
        protocol: "SQL/TLS"
        encrypted: true
