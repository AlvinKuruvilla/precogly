# =============================================================================
# AWS Technologies Pack
# =============================================================================
# This pack provides AWS service components for threat modeling.
# Components are "stubs" - they define what services exist, not what can go wrong.
# Threats should be added via separate threat packs or by extending components.
# =============================================================================

pack:
  slug: aws-technologies
  name: "AWS Technologies"
  description: "Amazon Web Services cloud components for threat modeling diagrams"
  version: "1.0.0"
  author: "Precogly Team"
  pack_type: technology
  tier: free
  source: official
  industries:
    - all
  tags:
    - aws
    - cloud
    - infrastructure
  repository_url: "https://github.com/precogly/precogly"
  documentation_url: "https://docs.aws.amazon.com/"

# =============================================================================
# COMPONENTS
# =============================================================================

components:
  # ---------------------------------------------------------------------------
  # DATABASES
  # ---------------------------------------------------------------------------
  - slug: rds-postgresql
    name: "AWS RDS (PostgreSQL)"
    category: datastore
    component_type: database
    description: "Managed PostgreSQL database service"

  - slug: rds-mysql
    name: "AWS RDS (MySQL)"
    category: datastore
    component_type: database
    description: "Managed MySQL database service"

  - slug: aurora
    name: "AWS Aurora"
    category: datastore
    component_type: database
    description: "High-performance managed relational database"

  - slug: dynamodb
    name: "AWS DynamoDB"
    category: datastore
    component_type: database
    description: "Managed NoSQL key-value and document database"

  - slug: redshift
    name: "AWS Redshift"
    category: datastore
    component_type: database
    description: "Cloud data warehouse for analytics"

  - slug: documentdb
    name: "AWS DocumentDB"
    category: datastore
    component_type: database
    description: "MongoDB-compatible document database"

  # ---------------------------------------------------------------------------
  # STORAGE
  # ---------------------------------------------------------------------------
  - slug: s3
    name: "AWS S3"
    category: datastore
    component_type: storage
    description: "Simple Storage Service - object storage"

  - slug: efs
    name: "AWS EFS"
    category: datastore
    component_type: storage
    description: "Elastic File System - managed NFS"

  - slug: fsx
    name: "AWS FSx"
    category: datastore
    component_type: storage
    description: "Managed file storage (Windows, Lustre, NetApp, OpenZFS)"

  # ---------------------------------------------------------------------------
  # CACHE
  # ---------------------------------------------------------------------------
  - slug: elasticache-redis
    name: "AWS ElastiCache (Redis)"
    category: datastore
    component_type: cache
    description: "Managed Redis in-memory cache"

  - slug: elasticache-memcached
    name: "AWS ElastiCache (Memcached)"
    category: datastore
    component_type: cache
    description: "Managed Memcached in-memory cache"

  # ---------------------------------------------------------------------------
  # COMPUTE
  # ---------------------------------------------------------------------------
  - slug: lambda
    name: "AWS Lambda"
    category: process
    component_type: compute
    description: "Serverless function execution"

  - slug: ecs
    name: "AWS ECS"
    category: process
    component_type: compute
    description: "Elastic Container Service - container orchestration"

  - slug: eks
    name: "AWS EKS"
    category: process
    component_type: compute
    description: "Elastic Kubernetes Service - managed Kubernetes"

  - slug: ec2
    name: "AWS EC2"
    category: process
    component_type: compute
    description: "Elastic Compute Cloud - virtual servers"

  - slug: fargate
    name: "AWS Fargate"
    category: process
    component_type: compute
    description: "Serverless container execution"

  - slug: apprunner
    name: "AWS App Runner"
    category: process
    component_type: compute
    description: "Fully managed container application service"

  - slug: beanstalk
    name: "AWS Elastic Beanstalk"
    category: process
    component_type: compute
    description: "PaaS for web applications"

  # ---------------------------------------------------------------------------
  # MESSAGING
  # ---------------------------------------------------------------------------
  - slug: sqs
    name: "AWS SQS"
    category: process
    component_type: messaging
    description: "Simple Queue Service - message queuing"

  - slug: sns
    name: "AWS SNS"
    category: process
