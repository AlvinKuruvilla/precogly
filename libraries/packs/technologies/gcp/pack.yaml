# =============================================================================
# GCP Technologies Pack
# =============================================================================
# This pack provides Google Cloud Platform service components for threat modeling.
# Components are "stubs" - they define what services exist, not what can go wrong.
# Threats should be added via separate threat packs or by extending components.
# =============================================================================

pack:
  slug: gcp-technologies
  name: "GCP Technologies"
  description: "Google Cloud Platform components for threat modeling diagrams"
  version: "1.0.0"
  author: "Precogly Team"
  pack_type: technology
  tier: free
  source: official
  industries:
    - all
  tags:
    - gcp
    - google
    - cloud
    - infrastructure
  repository_url: "https://github.com/precogly/precogly"
  documentation_url: "https://cloud.google.com/docs"

# =============================================================================
# COMPONENTS
# =============================================================================

components:
  # ---------------------------------------------------------------------------
  # DATABASES
  # ---------------------------------------------------------------------------
  - slug: cloudsql-postgresql
    name: "GCP Cloud SQL (PostgreSQL)"
    category: datastore
    component_type: database
    description: "Managed PostgreSQL database service"

  - slug: cloudsql-mysql
    name: "GCP Cloud SQL (MySQL)"
    category: datastore
    component_type: database
    description: "Managed MySQL database service"

  - slug: firestore
    name: "GCP Firestore"
    category: datastore
    component_type: database
    description: "Serverless NoSQL document database"

  - slug: bigtable
    name: "GCP Bigtable"
    category: datastore
    component_type: database
    description: "Wide-column NoSQL database"

  - slug: bigquery
    name: "GCP BigQuery"
    category: datastore
    component_type: database
    description: "Serverless data warehouse"

  - slug: spanner
    name: "GCP Cloud Spanner"
    category: datastore
    component_type: database
    description: "Globally distributed relational database"

  - slug: datastore
    name: "GCP Datastore"
    category: datastore
    component_type: database
    description: "NoSQL document database (legacy mode)"

  # ---------------------------------------------------------------------------
  # STORAGE
  # ---------------------------------------------------------------------------
  - slug: cloud-storage
    name: "GCP Cloud Storage"
    category: datastore
    component_type: storage
    description: "Object storage service"

  - slug: filestore
    name: "GCP Filestore"
    category: datastore
    component_type: storage
    description: "Managed NFS file storage"

  - slug: persistent-disk
    name: "GCP Persistent Disk"
    category: datastore
    component_type: storage
    description: "Block storage for VMs"

  # ---------------------------------------------------------------------------
  # CACHE
  # ---------------------------------------------------------------------------
  - slug: memorystore-redis
    name: "GCP Memorystore (Redis)"
    category: datastore
    component_type: cache
    description: "Managed Redis in-memory cache"

  - slug: memorystore-memcached
    name: "GCP Memorystore (Memcached)"
    category: datastore
    component_type: cache
    description: "Managed Memcached in-memory cache"

  # ---------------------------------------------------------------------------
  # COMPUTE
  # ---------------------------------------------------------------------------
  - slug: cloud-functions
    name: "GCP Cloud Functions"
    category: process
    component_type: compute
    description: "Serverless function execution"

  - slug: cloud-run
