template:
  slug: azure-data-pipeline
  name: "Azure Data Pipeline"
  description: "Real-time and batch data processing with Event Hub, Stream Analytics, and Data Lake"
  category: api
  diagram_type: level1

canvas_data:
  nodes:
    # External data sources (outside all boundaries)
    - id: "actor-iot-devices"
      type: "actor"
      position: { x: 50, y: 130 }
      data:
        label: "IoT Devices"
        actorType: "system"
        description: "Sensors and edge devices sending telemetry"

    - id: "actor-app-events"
      type: "actor"
      position: { x: 50, y: 300 }
      data:
        label: "Application Events"
        actorType: "system"
        description: "Business applications emitting events"

    - id: "actor-external-api"
      type: "actor"
      position: { x: 50, y: 470 }
      data:
        label: "External APIs"
        actorType: "external"
        description: "Third-party data sources"

    # Consumers (outside boundaries)
    - id: "actor-analyst"
      type: "actor"
      position: { x: 1100, y: 130 }
      data:
        label: "Data Analyst"
        actorType: "user"
        description: "Business analyst accessing reports"

    - id: "actor-ml-service"
      type: "actor"
      position: { x: 1100, y: 470 }
      data:
        label: "ML Pipeline"
        actorType: "system"
        description: "Machine learning training pipeline"

    # System boundary - Azure Data Platform
    - id: "sb-azure"
      type: "systemScope"
      position: { x: 200, y: 50 }
      style: { width: 870, height: 580 }
      data:
        label: "Azure Data Platform"
        owner: "Data Engineering Team"
        classification: "Production"

    # Trust boundary - Ingestion (inside sb-azure)
    - id: "tb-ingestion"
      type: "trustBoundary"
      parentId: "sb-azure"
      position: { x: 30, y: 60 }
      style: { width: 220, height: 400 }
      data:
        label: "Ingestion Zone"
        boundaryType: "dmz"
        technology: "Event Hub Namespace"

    # Trust boundary - Processing (inside sb-azure)
    - id: "tb-processing"
      type: "trustBoundary"
      parentId: "sb-azure"
      position: { x: 280, y: 60 }
      style: { width: 280, height: 480 }
      data:
        label: "Processing Zone"
        boundaryType: "privateSecured"
        technology: "Azure VNet Integration"

    # Trust boundary - Storage (inside sb-azure)
    - id: "tb-storage"
      type: "trustBoundary"
      parentId: "sb-azure"
      position: { x: 590, y: 60 }
      style: { width: 250, height: 480 }
      data:
        label: "Storage Zone"
        boundaryType: "privateSecured"
        technology: "Private Endpoints"

    # Ingestion components (inside tb-ingestion)
    - id: "process-eventhub"
      type: "process"
      parentId: "tb-ingestion"
      position: { x: 35, y: 60 }
      data:
        label: "Event Hub"
        technology: "Azure Event Hub"
        description: "High-throughput event streaming"

    - id: "process-iothub"
      type: "process"
      parentId: "tb-ingestion"
      position: { x: 35, y: 170 }
      data:
        label: "IoT Hub"
        technology: "Azure IoT Hub"
        description: "IoT device management and ingestion"

    - id: "process-datafactory-ingest"
      type: "process"
      parentId: "tb-ingestion"
      position: { x: 35, y: 280 }
      data:
        label: "Data Factory"
        technology: "Azure Data Factory"
        description: "Batch data ingestion and orchestration"

    # Processing components (inside tb-processing)
    - id: "process-streamanalytics"
      type: "process"
      parentId: "tb-processing"
      position: { x: 30, y: 60 }
      data:
        label: "Stream Analytics"
        technology: "Azure Stream Analytics"
        description: "Real-time stream processing"

    - id: "process-databricks"
      type: "process"
      parentId: "tb-processing"
      position: { x: 30, y: 180 }
      data:
        label: "Databricks"
        technology: "Azure Databricks"
        description: "Spark-based data transformation"

    - id: "process-synapse"
      type: "process"
      parentId: "tb-processing"
      position: { x: 30, y: 300 }
      data:
        label: "Synapse Analytics"
        technology: "Azure Synapse Analytics"
        description: "Data warehouse and SQL analytics"

    # Serving components (inside tb-processing)
    - id: "process-powerbi"
      type: "process"
      parentId: "tb-processing"
      position: { x: 140, y: 60 }
      data:
        label: "Power BI"
        technology: "Power BI Service"
        description: "Business intelligence dashboards"

    # Storage components (inside tb-storage)
    - id: "datastore-datalake-raw"
      type: "datastore"
      parentId: "tb-storage"
      position: { x: 45, y: 60 }
      data:
        label: "Data Lake (Raw)"
        technology: "Azure Data Lake Gen2"
        description: "Raw data landing zone"
        dataSensitivity: "internal"

    - id: "datastore-datalake-curated"
      type: "datastore"
      parentId: "tb-storage"
      position: { x: 45, y: 180 }
      data:
        label: "Data Lake (Curated)"
        technology: "Azure Data Lake Gen2"
        description: "Transformed and curated data"
        dataSensitivity: "confidential"

    - id: "datastore-sqlpool"
      type: "datastore"
      parentId: "tb-storage"
      position: { x: 45, y: 300 }
      data:
        label: "Dedicated SQL Pool"
        technology: "Synapse SQL Pool"
        description: "Data warehouse for analytics"
        dataSensitivity: "confidential"

    - id: "datastore-keyvault"
      type: "datastore"
      parentId: "tb-storage"
      position: { x: 45, y: 400 }
      data:
        label: "Key Vault"
        technology: "Azure Key Vault"
        description: "Connection strings and secrets"
        dataSensitivity: "confidential"

  edges:
    # Ingestion flows
    - id: "edge-iot-iothub"
      source: "actor-iot-devices"
      target: "process-iothub"
      type: "dataFlow"
      data:
        label: "Telemetry"
        protocol: "MQTT/AMQP"
        encrypted: true

    - id: "edge-app-eventhub"
      source: "actor-app-events"
      target: "process-eventhub"
      type: "dataFlow"
      data:
        label: "Event Stream"
        protocol: "AMQP"
        encrypted: true

    - id: "edge-api-datafactory"
      source: "actor-external-api"
      target: "process-datafactory-ingest"
      type: "dataFlow"
      data:
        label: "Batch Pull"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-iothub-eventhub"
      source: "process-iothub"
      target: "process-eventhub"
      type: "dataFlow"
      data:
        label: "Route Messages"
        protocol: "Internal"
        encrypted: true

    # Stream processing
    - id: "edge-eventhub-stream"
      source: "process-eventhub"
      target: "process-streamanalytics"
      type: "dataFlow"
      data:
        label: "Real-time Events"
        protocol: "AMQP"
        encrypted: true

    - id: "edge-stream-datalake"
      source: "process-streamanalytics"
      target: "datastore-datalake-raw"
      type: "dataFlow"
      data:
        label: "Stream Output"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-stream-powerbi"
      source: "process-streamanalytics"
      target: "process-powerbi"
      type: "dataFlow"
      data:
        label: "Real-time Dashboard"
        protocol: "HTTPS"
        encrypted: true

    # Batch processing
    - id: "edge-datafactory-datalake"
      source: "process-datafactory-ingest"
      target: "datastore-datalake-raw"
      type: "dataFlow"
      data:
        label: "Land Data"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-datalake-databricks"
      source: "datastore-datalake-raw"
      target: "process-databricks"
      type: "dataFlow"
      data:
        label: "Read Raw Data"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-databricks-curated"
      source: "process-databricks"
      target: "datastore-datalake-curated"
      type: "dataFlow"
      data:
        label: "Write Curated"
        protocol: "HTTPS"
        encrypted: true
        dataClassification: ["Customer Data"]

    # Analytics
    - id: "edge-curated-synapse"
      source: "datastore-datalake-curated"
      target: "process-synapse"
      type: "dataFlow"
      data:
        label: "External Tables"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-synapse-sqlpool"
      source: "process-synapse"
      target: "datastore-sqlpool"
      type: "dataFlow"
      data:
        label: "Load DW"
        protocol: "SQL/TLS"
        encrypted: true

    - id: "edge-sqlpool-powerbi"
      source: "datastore-sqlpool"
      target: "process-powerbi"
      type: "dataFlow"
      data:
        label: "Query Results"
        protocol: "SQL/TLS"
        encrypted: true

    # Consumer access
    - id: "edge-analyst-powerbi"
      source: "actor-analyst"
      target: "process-powerbi"
      type: "dataFlow"
      data:
        label: "View Reports"
        protocol: "HTTPS"
        encrypted: true
        authenticated: true

    - id: "edge-ml-curated"
      source: "datastore-datalake-curated"
      target: "actor-ml-service"
      type: "dataFlow"
      data:
        label: "Training Data"
        protocol: "HTTPS"
        encrypted: true

    # Secrets
    - id: "edge-databricks-keyvault"
      source: "process-databricks"
      target: "datastore-keyvault"
      type: "dataFlow"
      data:
        label: "Fetch Secrets"
        protocol: "HTTPS"
        encrypted: true
        authenticated: true

    - id: "edge-datafactory-keyvault"
      source: "process-datafactory-ingest"
      target: "datastore-keyvault"
      type: "dataFlow"
      data:
        label: "Fetch Secrets"
        protocol: "HTTPS"
        encrypted: true
        authenticated: true
