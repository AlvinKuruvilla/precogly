# =============================================================================
# Azure Technologies Pack
# =============================================================================
# This pack provides Microsoft Azure service components for threat modeling.
# Components are "stubs" - they define what services exist, not what can go wrong.
# Threats should be added via separate threat packs or by extending components.
# =============================================================================

pack:
  slug: azure-technologies
  name: "Azure Technologies"
  description: "Microsoft Azure cloud components for threat modeling diagrams"
  version: "1.0.0"
  author: "Precogly Team"
  pack_type: technology
  tier: free
  source: official
  industries:
    - all
  tags:
    - azure
    - microsoft
    - cloud
    - infrastructure
  repository_url: "https://github.com/precogly/precogly"
  documentation_url: "https://docs.microsoft.com/azure/"

# =============================================================================
# COMPONENTS
# =============================================================================

components:
  # ---------------------------------------------------------------------------
  # DATABASES
  # ---------------------------------------------------------------------------
