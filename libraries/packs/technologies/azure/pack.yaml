    name: "Azure SQL Database"
    category: datastore
    component_type: database
    description: "Managed SQL Server database service"

  - slug: cosmosdb
    name: "Azure Cosmos DB"
    category: datastore
    component_type: database
    description: "Globally distributed multi-model database"

  - slug: postgresql
