template:
  slug: azure-serverless-functions
  name: "Azure Serverless Functions"
  description: "Event-driven serverless architecture with Azure Functions, Event Grid, and Storage"
  category: api
  diagram_type: level1

canvas_data:
  nodes:
    # External actors (outside all boundaries)
    - id: "actor-webhook"
      type: "humanActor"
      position: { x: 50, y: 150 }
      data:
        label: "External Webhook"
        actorType: "system"
        description: "Third-party system sending webhook events"

    - id: "actor-user"
      type: "humanActor"
      position: { x: 50, y: 320 }
      data:
        label: "API Consumer"
        actorType: "external"
        description: "Client consuming REST API"

    - id: "actor-scheduler"
      type: "humanActor"
      position: { x: 50, y: 520 }
      data:
        label: "Timer Trigger"
        actorType: "system"
        description: "Azure scheduled tasks (CRON)"

    # System boundary - Azure Subscription
    - id: "sb-azure"
      type: "systemScope"
      position: { x: 200, y: 50 }
      style: { width: 1000, height: 600 }
      data:
        label: "Azure Subscription"
        owner: "Serverless Team"
        classification: "Production"

    # Trust boundary - API Gateway (inside sb-azure)
    - id: "tb-gateway"
      type: "trustBoundary"
      parentId: "sb-azure"
      position: { x: 30, y: 60 }
      style: { width: 220, height: 300 }
      data:
        label: "Gateway Zone"
        boundaryType: "dmz"
        technology: "Azure API Management"

    # Trust boundary - Functions (inside sb-azure)
    - id: "tb-functions"
      type: "trustBoundary"
      parentId: "sb-azure"
      position: { x: 280, y: 60 }
      style: { width: 400, height: 300 }
      data:
        label: "Compute Zone"
        boundaryType: "privateSecured"
        technology: "Azure Functions Premium"

    # Trust boundary - Data (inside sb-azure)
    - id: "tb-data"
      type: "trustBoundary"
      parentId: "sb-azure"
      position: { x: 710, y: 60 }
      style: { width: 260, height: 420 }
      data:
        label: "Data Zone"
        boundaryType: "privateSecured"
        technology: "Azure Private Endpoints"

    # Gateway components (inside tb-gateway)
    - id: "process-apim"
      type: "process"
      parentId: "tb-gateway"
      position: { x: 35, y: 60 }
      data:
        label: "API Management"
        technology: "Azure API Management"
        description: "API gateway with policies and rate limiting"

    - id: "process-eventgrid"
      type: "process"
      parentId: "tb-gateway"
      position: { x: 35, y: 180 }
      data:
        label: "Event Grid"
        technology: "Azure Event Grid"
        description: "Event routing and delivery"

    # Azure Functions (inside tb-functions)
    - id: "process-func-api"
      type: "process"
      parentId: "tb-functions"
      position: { x: 30, y: 60 }
      data:
        label: "HTTP Function"
        technology: "Azure Functions (HTTP Trigger)"
        description: "REST API endpoints"

    - id: "process-func-event"
      type: "process"
      parentId: "tb-functions"
      position: { x: 220, y: 60 }
      data:
        label: "Event Function"
        technology: "Azure Functions (Event Grid Trigger)"
        description: "Event processor"

    - id: "process-func-queue"
      type: "process"
      parentId: "tb-functions"
      position: { x: 30, y: 180 }
      data:
        label: "Queue Function"
        technology: "Azure Functions (Queue Trigger)"
        description: "Async message processor"

    - id: "process-func-timer"
      type: "process"
      parentId: "tb-functions"
      position: { x: 220, y: 180 }
      data:
        label: "Timer Function"
        technology: "Azure Functions (Timer Trigger)"
        description: "Scheduled batch jobs"

    # Queue (inside sb-azure, shared service)
    - id: "process-queue"
      type: "process"
      parentId: "sb-azure"
      position: { x: 80, y: 480 }
      data:
        label: "Storage Queue"
        technology: "Azure Storage Queue"
        description: "Message queue for async processing"

    # Data stores (inside tb-data)
    - id: "datastore-cosmos"
      type: "datastore"
      parentId: "tb-data"
      position: { x: 50, y: 60 }
      data:
        label: "Cosmos DB"
        technology: "Azure Cosmos DB (Serverless)"
        description: "NoSQL database with auto-scaling"
        dataSensitivity: "confidential"

    - id: "datastore-blob"
      type: "datastore"
      parentId: "tb-data"
      position: { x: 50, y: 180 }
      data:
        label: "Blob Storage"
        technology: "Azure Blob Storage"
        description: "Object storage for files and artifacts"

    - id: "datastore-keyvault"
      type: "datastore"
      parentId: "tb-data"
      position: { x: 50, y: 300 }
      data:
        label: "Key Vault"
        technology: "Azure Key Vault"
        description: "Secrets and connection strings"
        dataSensitivity: "confidential"

    # Monitoring (inside sb-azure)
    - id: "process-appinsights"
      type: "process"
      parentId: "sb-azure"
      position: { x: 380, y: 480 }
      data:
        label: "App Insights"
        technology: "Application Insights"
        description: "Distributed tracing and monitoring"

  edges:
    # External to Gateway
    - id: "edge-webhook-eventgrid"
      source: "actor-webhook"
      target: "process-eventgrid"
      type: "dataFlow"
      data:
        label: "Webhook Events"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-user-apim"
      source: "actor-user"
      target: "process-apim"
      type: "dataFlow"
      data:
        label: "API Requests"
        protocol: "HTTPS"
        encrypted: true
        authenticated: true

    - id: "edge-scheduler-timer"
      source: "actor-scheduler"
      target: "process-func-timer"
      type: "dataFlow"
      data:
        label: "Timer Trigger"
        protocol: "Internal"
        encrypted: false

    # Gateway to Functions
    - id: "edge-apim-funcapi"
      source: "process-apim"
      target: "process-func-api"
      type: "dataFlow"
      data:
        label: "HTTP Trigger"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-eventgrid-funcevent"
      source: "process-eventgrid"
      target: "process-func-event"
      type: "dataFlow"
      data:
        label: "Event Delivery"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-queue-funcqueue"
      source: "process-queue"
      target: "process-func-queue"
      type: "dataFlow"
      data:
        label: "Queue Trigger"
        protocol: "HTTPS"
        encrypted: true

    # Function to Function (via queue)
    - id: "edge-funcapi-queue"
      source: "process-func-api"
      target: "process-queue"
      type: "dataFlow"
      data:
        label: "Queue Message"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-funcevent-queue"
      source: "process-func-event"
      target: "process-queue"
      type: "dataFlow"
      data:
        label: "Queue Message"
        protocol: "HTTPS"
        encrypted: true

    # Functions to Data
    - id: "edge-funcapi-cosmos"
      source: "process-func-api"
      target: "datastore-cosmos"
      type: "dataFlow"
      data:
        label: "CRUD Operations"
        protocol: "HTTPS"
        encrypted: true
        dataClassification: ["Customer Data"]

    - id: "edge-funcqueue-cosmos"
      source: "process-func-queue"
      target: "datastore-cosmos"
      type: "dataFlow"
      data:
        label: "Write Results"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-funcevent-blob"
      source: "process-func-event"
      target: "datastore-blob"
      type: "dataFlow"
      data:
        label: "Store Artifacts"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-functimer-blob"
      source: "process-func-timer"
      target: "datastore-blob"
      type: "dataFlow"
      data:
        label: "Batch Output"
        protocol: "HTTPS"
        encrypted: true

    # Secrets
    - id: "edge-funcapi-keyvault"
      source: "process-func-api"
      target: "datastore-keyvault"
      type: "dataFlow"
      data:
        label: "Fetch Secrets"
        protocol: "HTTPS"
        encrypted: true
        authenticated: true

    # Monitoring
    - id: "edge-funcapi-appinsights"
      source: "process-func-api"
      target: "process-appinsights"
      type: "dataFlow"
      data:
        label: "Telemetry"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-funcqueue-appinsights"
      source: "process-func-queue"
      target: "process-appinsights"
      type: "dataFlow"
      data:
        label: "Telemetry"
        protocol: "HTTPS"
        encrypted: true
