template:
  slug: azure-microservices-aks
  name: "Azure Microservices (AKS)"
  description: "Kubernetes-based microservices architecture with AKS, Service Bus, and Cosmos DB"
  category: microservices
  diagram_type: level1

canvas_data:
  nodes:
    # External actors (outside all boundaries)
    - id: "actor-client"
      type: "humanActor"
      position: { x: 50, y: 220 }
      data:
        label: "Client App"
        actorType: "external"
        description: "Mobile or web client application"

    - id: "actor-admin"
      type: "humanActor"
      position: { x: 50, y: 550 }
      data:
        label: "DevOps Admin"
        actorType: "user"
        description: "Platform administrator"

    # System boundary - Azure Subscription
    - id: "sb-azure"
      type: "systemScope"
      position: { x: 200, y: 50 }
      style: { width: 1050, height: 620 }
      data:
        label: "Azure Subscription"
        owner: "Platform Team"
        classification: "Production"

    # Trust boundary - DMZ/Edge (inside sb-azure)
    - id: "tb-edge"
      type: "trustBoundary"
      parentId: "sb-azure"
      position: { x: 30, y: 60 }
      style: { width: 220, height: 180 }
      data:
        label: "Edge Zone"
        boundaryType: "dmz"
        technology: "Azure Front Door"

    # Trust boundary - AKS Cluster (inside sb-azure)
    - id: "tb-aks"
      type: "trustBoundary"
      parentId: "sb-azure"
      position: { x: 280, y: 60 }
      style: { width: 450, height: 400 }
      data:
        label: "AKS Cluster"
        boundaryType: "privateSecured"
        technology: "Azure Kubernetes Service"

    # Trust boundary - Data Zone (inside sb-azure)
    - id: "tb-data"
      type: "trustBoundary"
      parentId: "sb-azure"
      position: { x: 760, y: 60 }
      style: { width: 260, height: 420 }
      data:
        label: "Data Zone"
        boundaryType: "privateSecured"
        technology: "Azure Private Link"

    # Edge services (inside tb-edge)
    - id: "process-apim"
      type: "process"
      parentId: "tb-edge"
      position: { x: 35, y: 60 }
      data:
        label: "API Management"
        technology: "Azure API Management"
        description: "API gateway with rate limiting, auth, and routing"

    # AKS Services (inside tb-aks)
    - id: "process-ingress"
      type: "process"
      parentId: "tb-aks"
      position: { x: 30, y: 60 }
      data:
        label: "Ingress Controller"
        technology: "NGINX Ingress"
        description: "Kubernetes ingress for internal routing"

    - id: "process-svc-orders"
      type: "process"
      parentId: "tb-aks"
      position: { x: 30, y: 170 }
      data:
        label: "Orders Service"
        technology: "Container (.NET)"
        description: "Order management microservice"

    - id: "process-svc-inventory"
      type: "process"
      parentId: "tb-aks"
      position: { x: 240, y: 170 }
      data:
        label: "Inventory Service"
        technology: "Container (Node.js)"
        description: "Inventory tracking microservice"

    - id: "process-svc-notifications"
      type: "process"
      parentId: "tb-aks"
      position: { x: 135, y: 280 }
      data:
        label: "Notification Service"
        technology: "Container (Python)"
        description: "Email and push notification service"

    # Messaging (inside sb-azure, outside specific trust boundaries)
    - id: "process-servicebus"
      type: "process"
      parentId: "sb-azure"
      position: { x: 330, y: 520 }
      data:
        label: "Service Bus"
        technology: "Azure Service Bus"
        description: "Message broker for async communication"

    # Data stores (inside tb-data)
    - id: "datastore-cosmos"
      type: "datastore"
      parentId: "tb-data"
      position: { x: 50, y: 60 }
      data:
        label: "Cosmos DB"
        technology: "Azure Cosmos DB"
        description: "NoSQL database for orders and inventory"
        dataSensitivity: "confidential"

    - id: "datastore-redis"
      type: "datastore"
      parentId: "tb-data"
      position: { x: 50, y: 180 }
      data:
        label: "Redis Cache"
        technology: "Azure Cache for Redis"
        description: "Distributed cache for session and hot data"

    - id: "datastore-keyvault"
      type: "datastore"
      parentId: "tb-data"
      position: { x: 50, y: 300 }
      data:
        label: "Key Vault"
        technology: "Azure Key Vault"
        description: "Secrets and certificate management"
        dataSensitivity: "confidential"

    # Monitoring (inside sb-azure)
    - id: "process-monitor"
      type: "process"
      parentId: "sb-azure"
      position: { x: 80, y: 520 }
      data:
        label: "Azure Monitor"
        technology: "Azure Monitor + App Insights"
        description: "Centralized logging and APM"

  edges:
    # Client flows
    - id: "edge-client-apim"
      source: "actor-client"
      target: "process-apim"
      type: "dataFlow"
      data:
        label: "API Requests"
        protocol: "HTTPS"
        encrypted: true
        authenticated: true

    # APIM to AKS
    - id: "edge-apim-ingress"
      source: "process-apim"
      target: "process-ingress"
      type: "dataFlow"
      data:
        label: "Routed Requests"
        protocol: "HTTPS"
        encrypted: true

    # Ingress to services
    - id: "edge-ingress-orders"
      source: "process-ingress"
      target: "process-svc-orders"
      type: "dataFlow"
      data:
        label: "Order Requests"
        protocol: "HTTP"
        encrypted: false

    - id: "edge-ingress-inventory"
      source: "process-ingress"
      target: "process-svc-inventory"
      type: "dataFlow"
      data:
        label: "Inventory Queries"
        protocol: "HTTP"
        encrypted: false

    # Service to Service Bus
    - id: "edge-orders-servicebus"
      source: "process-svc-orders"
      target: "process-servicebus"
      type: "dataFlow"
      data:
        label: "Order Events"
        protocol: "AMQP"
        encrypted: true

    - id: "edge-servicebus-notifications"
      source: "process-servicebus"
      target: "process-svc-notifications"
      type: "dataFlow"
      data:
        label: "Notification Events"
        protocol: "AMQP"
        encrypted: true

    - id: "edge-servicebus-inventory"
      source: "process-servicebus"
      target: "process-svc-inventory"
      type: "dataFlow"
      data:
        label: "Inventory Updates"
        protocol: "AMQP"
        encrypted: true

    # Data access
    - id: "edge-orders-cosmos"
      source: "process-svc-orders"
      target: "datastore-cosmos"
      type: "dataFlow"
      data:
        label: "Order Data"
        protocol: "HTTPS"
        encrypted: true
        dataClassification: ["Customer Data"]

    - id: "edge-inventory-cosmos"
      source: "process-svc-inventory"
      target: "datastore-cosmos"
      type: "dataFlow"
      data:
        label: "Inventory Data"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-orders-redis"
      source: "process-svc-orders"
      target: "datastore-redis"
      type: "dataFlow"
      data:
        label: "Cache Reads"
        protocol: "Redis/TLS"
        encrypted: true

    - id: "edge-inventory-redis"
      source: "process-svc-inventory"
      target: "datastore-redis"
      type: "dataFlow"
      data:
        label: "Cache Reads"
        protocol: "Redis/TLS"
        encrypted: true

    # Secrets access
    - id: "edge-orders-keyvault"
      source: "process-svc-orders"
      target: "datastore-keyvault"
      type: "dataFlow"
      data:
        label: "Fetch Secrets"
        protocol: "HTTPS"
        encrypted: true
        authenticated: true

    # Admin and monitoring
    - id: "edge-admin-monitor"
      source: "actor-admin"
      target: "process-monitor"
      type: "dataFlow"
      data:
        label: "View Logs/Metrics"
        protocol: "HTTPS"
        encrypted: true
        authenticated: true

    - id: "edge-ingress-monitor"
      source: "process-ingress"
      target: "process-monitor"
      type: "dataFlow"
      data:
        label: "Telemetry"
        protocol: "HTTPS"
        encrypted: true
