frameworks:
  - slug: cra-2024
    name: "CRA"
    version: "2024"
    issuer: "European Union"
    description: "Cyber Resilience Act (Regulation (EU) 2024/2847)"
    requirements:
      # ======================================================================
      # Article 10 — Obligations of manufacturers
      # ======================================================================
      - section_code: "Art. 10(1)"
        description: >
          Manufacturers shall ensure that products with digital elements are
          designed, developed, and produced in accordance with the essential
          cybersecurity requirements set out in Annex I.
      - section_code: "Art. 10(2)"
        description: >
          Manufacturers shall undertake a cybersecurity risk assessment of the
          product and take the outcome into account during planning, design,
          development, production, delivery, and maintenance phases.
      - section_code: "Art. 10(4)"
        description: >
          Manufacturers shall exercise due diligence when integrating components
          sourced from third parties to ensure they do not compromise the
          cybersecurity of the product.
      - section_code: "Art. 10(6)"
        description: >
          Manufacturers shall document the cybersecurity risk assessment and
          draw up the EU declaration of conformity, including technical
          documentation demonstrating compliance with Annex I.
      - section_code: "Art. 10(9)"
        description: >
          Manufacturers shall ensure that vulnerabilities are handled
          effectively and in accordance with the requirements of Annex I,
          Part II, for the expected product lifetime or five years, whichever
          is shorter.
      - section_code: "Art. 10(12)"
        description: >
          Manufacturers shall provide security updates for a minimum of five
          years after placing the product on the market, delivered without
          undue delay and free of charge.

      # ======================================================================
      # Article 11 — Reporting obligations
      # ======================================================================
      - section_code: "Art. 11(1)"
        description: >
          Manufacturers shall notify ENISA of any actively exploited
          vulnerability contained in the product without undue delay and in
          any event within 24 hours of becoming aware.
      - section_code: "Art. 11(2)"
        description: >
          Manufacturers shall notify ENISA of any severe incident having an
          impact on the security of the product without undue delay and in
          any event within 24 hours of becoming aware.
      - section_code: "Art. 11(4)"
        description: >
          Manufacturers shall inform affected users of the incident and, where
          applicable, of corrective measures that the user can deploy to
          mitigate the impact, without undue delay.

      # ======================================================================
      # Annex I, Part I — Security requirements for product properties
      # ======================================================================
      - section_code: "Annex I.1(a)"
        description: >
          Products shall be designed, developed, and produced to ensure an
          appropriate level of cybersecurity based on the risks, including
          consideration of intended purpose and foreseeable use.
      - section_code: "Annex I.1(b)"
        description: >
          Products shall be made available on the market without known
          exploitable vulnerabilities.
      - section_code: "Annex I.1(c)"
        description: >
          Products shall be delivered with a secure by default configuration,
          including the possibility to reset the product to its original state.
      - section_code: "Annex I.1(d)"
        description: >
          Products shall ensure protection against unauthorized access by
          appropriate control mechanisms, including authentication, identity,
          or access management systems.
      - section_code: "Annex I.1(e)"
        description: >
          Products shall protect the confidentiality of stored, transmitted,
          or otherwise processed data by means of encryption of data at rest
          and data in transit.
      - section_code: "Annex I.1(f)"
        description: >
          Products shall protect the integrity of stored, transmitted, or
          otherwise processed data, commands, programs, and configuration
          against manipulation or modification not authorized by the user.
      - section_code: "Annex I.1(g)"
        description: >
          Products shall process only data, personal or otherwise, that are
          adequate, relevant, and limited to what is necessary for the
          intended purpose (data minimization).
      - section_code: "Annex I.1(h)"
        description: >
          Products shall protect the availability of essential functions,
          including resilience against and mitigation of denial-of-service
          attacks.
      - section_code: "Annex I.1(i)"
        description: >
          Products shall minimize their own negative impact on the
          availability of services provided by other devices or networks.
      - section_code: "Annex I.1(j)"
        description: >
          Products shall be designed, developed, and produced to limit
          attack surfaces, including external interfaces.
      - section_code: "Annex I.1(k)"
        description: >
          Products shall be designed to ensure that exploitable
          vulnerabilities in any component have limited impact, including
          through mechanisms of exploitation mitigation.
      - section_code: "Annex I.1(l)"
        description: >
          Products shall provide security-related information by recording
          and monitoring relevant internal activity, including access to or
          modification of data, services, or functions.

      # ======================================================================
      # Annex I, Part II — Vulnerability handling requirements
      # ======================================================================
      - section_code: "Annex I.2(a)"
        description: >
          Manufacturers shall identify and document vulnerabilities and
          components contained in the product, including by drawing up a
          software bill of materials (SBOM).
      - section_code: "Annex I.2(b)"
        description: >
          Manufacturers shall address and remediate vulnerabilities without
          delay, including by providing security updates.
      - section_code: "Annex I.2(c)"
        description: >
          Manufacturers shall apply effective and regular tests and reviews
          of the security of the product.
      - section_code: "Annex I.2(d)"
        description: >
          Manufacturers shall publicly disclose information about fixed
          vulnerabilities, including a description and severity, without
          undue delay after a security update is available.
      - section_code: "Annex I.2(e)"
        description: >
          Manufacturers shall put in place and enforce a coordinated
          vulnerability disclosure policy.
      - section_code: "Annex I.2(f)"
        description: >
          Manufacturers shall provide mechanisms to securely distribute
          updates for the product to ensure that exploitable vulnerabilities
          are fixed or mitigated in a timely manner.
      - section_code: "Annex I.2(g)"
        description: >
          Manufacturers shall ensure that security updates are disseminated
          free of charge and accompanied by advisory messages providing users
          with relevant information.
