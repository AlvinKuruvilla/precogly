pack:
  slug: pci-dss
  path: frameworks/pci-dss
  name: "PCI-DSS v4.0"
  version: "1.0.0"
  pack_type: compliance
  tier: free
  author: "Precogly"
  description: "Payment Card Industry Data Security Standard v4.0 compliance framework"
  tags:
    - compliance
    - payment
    - security

frameworks:
  - slug: pci-dss-v4
    name: "PCI-DSS"
    version: "4.0"
    issuer: "PCI Security Standards Council"
    description: "Payment Card Industry Data Security Standard"
    requirements:
      - section_code: "3.4"
        description: "Render PAN unreadable anywhere it is stored"
      - section_code: "4.1"
        description: "Use strong cryptography and security protocols to safeguard sensitive cardholder data during transmission"
      - section_code: "6.5.1"
        description: "Injection flaws, particularly SQL injection"
      - section_code: "7.1"
        description: "Limit access to system components and cardholder data to only those individuals whose job requires such access"
      - section_code: "7.2"
        description: "Establish an access control system for systems components that restricts access based on a user's need to know"
      - section_code: "8.3"
        description: "Secure all individual non-console administrative access using multi-factor authentication"
      - section_code: "10.2"
        description: "Implement automated audit trails for all system components"
