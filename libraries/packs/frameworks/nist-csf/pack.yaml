pack:
  slug: nist-csf
  name: "NIST CSF 2.0"
  version: "1.0.0"
  pack_type: compliance
  tier: free
  author: "Precogly"
  description: "NIST Cybersecurity Framework 2.0"
  tags:
    - compliance
    - security
    - government

frameworks:
  - slug: nist-csf-2
    name: "NIST CSF"
    version: "2.0"
    issuer: "NIST"
    description: "NIST Cybersecurity Framework"
    requirements:
      - section_code: "PR.AC-1"
        description: "Identities and credentials are issued, managed, verified, revoked, and audited for authorized devices, users, and processes"
      - section_code: "PR.AC-4"
        description: "Access permissions and authorizations are managed, incorporating the principles of least privilege and separation of duties"
      - section_code: "PR.DS-4"
        description: "Adequate capacity to ensure availability is maintained"
      - section_code: "SC-8"
        description: "Transmission confidentiality and integrity"
