frameworks:
  - slug: hipaa-1996
    name: "HIPAA"
    version: "1996"
    issuer: "US HHS"
    description: "Health Insurance Portability and Accountability Act"
    requirements:
      - section_code: "164.312(a)(1)"
        description: "Access Control - Implement technical policies and procedures for electronic information systems"
      - section_code: "164.312(a)(2)(iv)"
        description: "Encryption and Decryption - Implement a mechanism to encrypt and decrypt ePHI"
      - section_code: "164.312(b)"
        description: "Audit Controls - Implement hardware, software, and procedural mechanisms"
      - section_code: "164.312(c)(1)"
        description: "Integrity - Implement policies and procedures to protect ePHI from improper alteration or destruction"
      - section_code: "164.312(e)(1)"
        description: "Transmission Security - Implement technical security measures to guard against unauthorized access to ePHI"
