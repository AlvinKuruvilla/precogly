pack:
  slug: mini-asvs
  path: frameworks/mini-asvs
  name: "OWASP ASVS 4.0 (Mini)"
  version: "1.0.0"
  pack_type: compliance
  tier: free
  author: "Precogly"
  description: >
    A curated subset of 20 requirements from the OWASP Application Security
    Verification Standard (ASVS) 4.0.3, covering architecture, authentication,
    access control, input validation, cryptography, logging, data protection,
    communications, business logic, API security, and configuration.
  tags:
    - compliance
    - security
    - asvs
    - verification
    - owasp

frameworks:
  - slug: asvs-4
    name: "OWASP ASVS"
    version: "4.0.3"
    issuer: "OWASP Foundation"
    description: "Application Security Verification Standard"
    requirements:
      # V1 - Architecture
      - section_code: "V1.4.1"
        description: "Verify that access controls are enforced on trusted service layer (gateways, servers, serverless functions), never on the client"
      - section_code: "V1.6.2"
        description: "Verify that consumers of cryptographic services protect key material using key vaults or API-based alternatives"
      - section_code: "V1.9.1"
        description: "Verify that communications between components are encrypted, particularly across containers, systems, or cloud providers"
      - section_code: "V1.14.1"
        description: "Verify segregation of components at differing trust levels through security controls, firewall rules, API gateways, or cloud security groups"
      # V2 - Authentication
      - section_code: "V2.10.4"
        description: "Verify that passwords, API keys, and internal secrets are managed securely and not stored in source code"
      # V4 - Access Control
      - section_code: "V4.1.1"
        description: "Verify that access control rules are enforced on a trusted service layer, not bypassed by client-side controls"
      - section_code: "V4.1.3"
        description: "Verify the principle of least privilege — users access only functions, data, URLs, and services for which they have specific authorization"
      # V5 - Validation
      - section_code: "V5.1.3"
        description: "Verify that all input is validated using positive validation (allow lists)"
      - section_code: "V5.1.4"
        description: "Verify that structured data is strongly typed and validated against a defined schema"
      - section_code: "V5.5.3"
        description: "Verify that deserialization of untrusted data is avoided or protected in custom code and third-party libraries"
      # V6 - Cryptography
      - section_code: "V6.1.1"
        description: "Verify that regulated private data (PII, sensitive personal information) is stored encrypted at rest"
      - section_code: "V6.4.1"
        description: "Verify that a secrets management solution (key vault) is used to create, store, control access to, and destroy secrets"
      # V7 - Logging
      - section_code: "V7.1.3"
        description: "Verify that security-relevant events are logged, including authentication, access control failures, and input validation failures"
      # V8 - Data Protection
      - section_code: "V8.1.5"
        description: "Verify that regular backups of important data are performed and test restoration is verified"
      - section_code: "V8.3.4"
        description: "Verify that all sensitive data has been identified and a policy exists for handling it"
      # V9 - Communications
      - section_code: "V9.1.1"
        description: "Verify that TLS is used for all client connectivity and does not fall back to insecure communications"
      - section_code: "V9.2.2"
        description: "Verify that encrypted communications (TLS) is used for all inbound and outbound connections including management, API, database, cloud, and serverless"
      # V11 - Business Logic
      - section_code: "V11.1.4"
        description: "Verify anti-automation controls protect against excessive calls such as mass data exfiltration, denial of service, or business logic abuse"
      # V13 - API
      - section_code: "V13.2.2"
        description: "Verify that JSON schema validation is in place and verified before accepting input"
      # V14 - Configuration
      - section_code: "V14.1.1"
        description: "Verify that build and deployment processes are performed in a secure and repeatable way (CI/CD automation, automated configuration management)"
