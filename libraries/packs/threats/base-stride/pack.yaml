# =============================================================================
# Base STRIDE Threat Pack
# =============================================================================
# This pack provides foundational STRIDE-based threats applicable to most systems.
# STRIDE is Microsoft's threat classification model:
#   - Spoofing: Pretending to be someone or something else
#   - Tampering: Modifying data or code without authorization
#   - Repudiation: Denying having performed an action
#   - Information Disclosure: Exposing data to unauthorized parties
#   - Denial of Service: Making a system unavailable
#   - Elevation of Privilege: Gaining unauthorized capabilities
#
# These threats are generic and can be linked to any component type.
# Industry-specific packs can extend these with more detailed threats.
# =============================================================================

pack:
  slug: base-stride
  name: "Base STRIDE Threats"
  description: "Foundational STRIDE-based threats and countermeasures for threat modeling"
  version: "1.0.0"
  author: "Precogly Team"
  pack_type: threat
  tier: free
  source: official
  industries:
    - all
  tags:
    - stride
    - foundational
    - security
    - threats
  repository_url: "https://github.com/precogly/precogly"
  documentation_url: "https://docs.microsoft.com/en-us/azure/security/develop/threat-modeling-tool-threats"

# =============================================================================
# THREATS - Organized by STRIDE Category
# =============================================================================

threats:
  # ---------------------------------------------------------------------------
  # SPOOFING - Pretending to be someone or something else
  # ---------------------------------------------------------------------------
  - slug: credential-theft
    name: "Credential Theft"
    description: "Attacker steals user credentials through phishing, keylogging, or credential harvesting to impersonate legitimate users"
    stride_category: spoofing
    severity: high
    applicable_to:
      - auth
      - frontend
      - backend
    countermeasures:
      - slug: multi-factor-authentication
        name: "Multi-Factor Authentication (MFA)"
        description: "Require additional authentication factors beyond passwords"
        control_type: technical
        cost: medium

      - slug: credential-rotation
        name: "Credential Rotation Policy"
        description: "Enforce regular password changes and API key rotation"
        control_type: procedural
        cost: low

      - slug: phishing-awareness-training
        name: "Phishing Awareness Training"
        description: "Train users to recognize and report phishing attempts"
        control_type: procedural
        cost: low

  - slug: session-hijacking
    name: "Session Hijacking"
    description: "Attacker steals or predicts session tokens to take over authenticated user sessions"
    stride_category: spoofing
    severity: high
    applicable_to:
      - frontend
      - backend
      - auth
    countermeasures:
      - slug: secure-session-management
        name: "Secure Session Management"
        description: "Use secure, random session tokens with proper expiration and invalidation"
        control_type: technical
        cost: low

      - slug: session-binding
        name: "Session Binding"
        description: "Bind sessions to client fingerprints (IP, user agent) to detect hijacking"
        control_type: technical
        cost: low

      - slug: https-only
        name: "HTTPS Only"
        description: "Enforce HTTPS to prevent session token interception"
        control_type: technical
        cost: low

  - slug: api-key-compromise
    name: "API Key Compromise"
    description: "Attacker obtains API keys through code repositories, logs, or network interception"
    stride_category: spoofing
    severity: high
    applicable_to:
      - backend
      - networking
    countermeasures:
      - slug: secrets-management
        name: "Secrets Management"
        description: "Store API keys in dedicated secrets management systems (Vault, KMS)"
        control_type: technical
        cost: medium

      - slug: api-key-rotation
        name: "API Key Rotation"
        description: "Regularly rotate API keys and revoke compromised keys immediately"
        control_type: procedural
        cost: low

      - slug: key-scope-limitation
        name: "Key Scope Limitation"
        description: "Limit API key permissions to minimum required scope"
        control_type: technical
        cost: low

  - slug: man-in-the-middle
    name: "Man-in-the-Middle Attack"
    description: "Attacker intercepts communication between parties to eavesdrop or modify data"
    stride_category: spoofing
    severity: critical
    applicable_to:
      - networking
      - frontend
      - backend
    countermeasures:
      - slug: tls-encryption
        name: "TLS Encryption"
        description: "Use TLS 1.2+ for all network communications"
        control_type: technical
        cost: low

      - slug: certificate-pinning
        name: "Certificate Pinning"
        description: "Pin expected certificates in clients to prevent MITM with forged certs"
        control_type: technical
        cost: medium

      - slug: mutual-tls
        name: "Mutual TLS (mTLS)"
        description: "Require client certificates for service-to-service authentication"
        control_type: technical
        cost: medium

  - slug: service-impersonation
    name: "Service Impersonation"
    description: "Attacker deploys a rogue service that impersonates a legitimate service"
    stride_category: spoofing
    severity: high
    applicable_to:
      - backend
      - messaging
      - networking
    countermeasures:
      - slug: service-authentication
        name: "Service Authentication"
        description: "Authenticate services using certificates or tokens before trusting them"
        control_type: technical
        cost: medium

      - slug: service-mesh
        name: "Service Mesh with Identity"
        description: "Use service mesh (Istio, Linkerd) to enforce service identity"
        control_type: technical
        cost: high

  # ---------------------------------------------------------------------------
  # TAMPERING - Modifying data or code without authorization
  # ---------------------------------------------------------------------------
  - slug: data-tampering
    name: "Data Tampering"
    description: "Attacker modifies data in transit or at rest without authorization"
    stride_category: tampering
    severity: high
    applicable_to:
      - database
      - storage
      - messaging
    countermeasures:
      - slug: data-integrity-checks
        name: "Data Integrity Checks"
        description: "Use checksums, HMACs, or digital signatures to detect tampering"
        control_type: technical
        cost: low

      - slug: immutable-audit-logs
        name: "Immutable Audit Logs"
        description: "Store audit logs in append-only storage to prevent tampering"
        control_type: technical
        cost: medium

      - slug: database-access-controls
        name: "Database Access Controls"
        description: "Implement role-based access control for database modifications"
        control_type: technical
        cost: low

  - slug: code-injection
    name: "Code Injection"
    description: "Attacker injects malicious code (SQL, XSS, command injection) into application"
    stride_category: tampering
    severity: critical
    applicable_to:
      - backend
      - frontend
      - database
    countermeasures:
      - slug: input-validation
        name: "Input Validation"
        description: "Validate and sanitize all user inputs against expected patterns"
        control_type: technical
        cost: low

      - slug: parameterized-queries
        name: "Parameterized Queries"
        description: "Use prepared statements and parameterized queries to prevent SQL injection"
        control_type: technical
        cost: low

      - slug: output-encoding
        name: "Output Encoding"
        description: "Encode output to prevent XSS attacks"
        control_type: technical
        cost: low

      - slug: content-security-policy
        name: "Content Security Policy"
        description: "Implement CSP headers to mitigate XSS and injection attacks"
        control_type: technical
        cost: low

  - slug: configuration-tampering
    name: "Configuration Tampering"
    description: "Attacker modifies application or infrastructure configuration to weaken security"
    stride_category: tampering
    severity: high
    applicable_to:
      - infrastructure
      - compute
      - backend
    countermeasures:
      - slug: configuration-management
        name: "Configuration Management"
        description: "Use infrastructure-as-code with version control for all configurations"
        control_type: technical
        cost: medium

      - slug: configuration-drift-detection
        name: "Configuration Drift Detection"
        description: "Monitor for unauthorized configuration changes"
        control_type: technical
        cost: medium

      - slug: immutable-infrastructure
        name: "Immutable Infrastructure"
        description: "Deploy immutable infrastructure that cannot be modified in place"
        control_type: technical
        cost: high

  - slug: message-tampering
    name: "Message Tampering"
    description: "Attacker modifies messages in transit between services"
    stride_category: tampering
    severity: high
    applicable_to:
      - messaging
      - networking
    countermeasures:
      - slug: message-signing
        name: "Message Signing"
        description: "Digitally sign messages to detect tampering"
        control_type: technical
        cost: medium

      - slug: message-encryption
        name: "Message Encryption"
        description: "Encrypt messages in transit to prevent reading and modification"
        control_type: technical
        cost: low

  - slug: binary-tampering
    name: "Binary/Container Tampering"
    description: "Attacker modifies application binaries or container images"
    stride_category: tampering
    severity: critical
    applicable_to:
      - compute
      - infrastructure
    countermeasures:
      - slug: image-signing
        name: "Image Signing"
        description: "Sign container images and verify signatures before deployment"
        control_type: technical
        cost: medium

      - slug: binary-verification
        name: "Binary Verification"
        description: "Verify checksums and signatures of all deployed binaries"
        control_type: technical
        cost: low

      - slug: supply-chain-security
        name: "Supply Chain Security"
        description: "Scan dependencies for vulnerabilities and verify provenance"
        control_type: technical
        cost: medium

  # ---------------------------------------------------------------------------
  # REPUDIATION - Denying having performed an action
  # ---------------------------------------------------------------------------
  - slug: action-repudiation
    name: "Action Repudiation"
    description: "User or attacker denies performing an action due to insufficient logging"
    stride_category: repudiation
    severity: medium
    applicable_to:
      - backend
      - database
      - auth
    countermeasures:
      - slug: comprehensive-audit-logging
        name: "Comprehensive Audit Logging"
        description: "Log all security-relevant actions with user identity and timestamp"
        control_type: technical
        cost: low

      - slug: tamper-evident-logs
        name: "Tamper-Evident Logs"
        description: "Use append-only storage or blockchain for critical audit logs"
        control_type: technical
        cost: medium

      - slug: log-integrity-monitoring
        name: "Log Integrity Monitoring"
        description: "Monitor logs for tampering and alert on suspicious modifications"
        control_type: technical
        cost: medium

  - slug: transaction-repudiation
    name: "Transaction Repudiation"
    description: "User denies initiating a financial or critical transaction"
    stride_category: repudiation
    severity: high
    applicable_to:
      - backend
      - database
    countermeasures:
      - slug: digital-signatures
        name: "Digital Signatures"
        description: "Require digital signatures for critical transactions"
        control_type: technical
        cost: medium

      - slug: transaction-receipts
        name: "Transaction Receipts"
        description: "Generate and store cryptographic receipts for all transactions"
        control_type: technical
        cost: low

      - slug: multi-party-approval
        name: "Multi-Party Approval"
        description: "Require multiple approvals for high-value transactions"
        control_type: procedural
        cost: medium

  - slug: log-deletion
    name: "Log Deletion or Modification"
    description: "Attacker deletes or modifies logs to hide malicious activity"
    stride_category: repudiation
    severity: high
    applicable_to:
      - monitoring
      - infrastructure
    countermeasures:
      - slug: centralized-logging
        name: "Centralized Logging"
        description: "Send logs to a centralized, secured logging system"
        control_type: technical
        cost: medium

      - slug: log-replication
        name: "Log Replication"
        description: "Replicate logs to multiple storage locations"
        control_type: technical
        cost: medium

      - slug: write-once-storage
        name: "Write-Once Storage"
        description: "Store critical logs in WORM (Write Once Read Many) storage"
        control_type: technical
        cost: high

  # ---------------------------------------------------------------------------
  # INFORMATION DISCLOSURE - Exposing data to unauthorized parties
  # ---------------------------------------------------------------------------
  - slug: data-breach
    name: "Data Breach"
    description: "Unauthorized access to sensitive data through application or infrastructure vulnerabilities"
    stride_category: information_disclosure
    severity: critical
    applicable_to:
      - database
      - storage
      - backend
    countermeasures:
      - slug: encryption-at-rest
        name: "Encryption at Rest"
        description: "Encrypt all sensitive data at rest using strong encryption (AES-256)"
        control_type: technical
        cost: medium

      - slug: encryption-in-transit
        name: "Encryption in Transit"
        description: "Encrypt all data in transit using TLS 1.2+"
        control_type: technical
        cost: low

      - slug: data-classification
        name: "Data Classification"
        description: "Classify data by sensitivity and apply appropriate protections"
        control_type: procedural
        cost: low

      - slug: data-loss-prevention
        name: "Data Loss Prevention (DLP)"
        description: "Implement DLP tools to detect and prevent data exfiltration"
        control_type: technical
        cost: high

  - slug: sensitive-data-exposure
    name: "Sensitive Data Exposure in Logs/Errors"
    description: "Sensitive data leaked through error messages, logs, or debug output"
    stride_category: information_disclosure
    severity: medium
    applicable_to:
      - backend
      - frontend
      - monitoring
    countermeasures:
      - slug: log-sanitization
        name: "Log Sanitization"
        description: "Mask or remove sensitive data from logs before storage"
        control_type: technical
        cost: low

      - slug: error-handling
        name: "Secure Error Handling"
        description: "Return generic error messages to users, log details internally"
        control_type: technical
        cost: low

      - slug: debug-mode-controls
        name: "Debug Mode Controls"
        description: "Disable debug mode in production environments"
        control_type: technical
        cost: low

  - slug: unauthorized-access
    name: "Unauthorized Data Access"
    description: "User accesses data they are not authorized to view (broken access control)"
    stride_category: information_disclosure
    severity: high
    applicable_to:
      - backend
      - database
      - storage
    countermeasures:
      - slug: access-control-enforcement
        name: "Access Control Enforcement"
        description: "Implement and enforce role-based or attribute-based access control"
        control_type: technical
        cost: medium

      - slug: authorization-checks
        name: "Server-Side Authorization Checks"
        description: "Verify authorization on every request, never trust client-side checks"
        control_type: technical
        cost: low

      - slug: principle-of-least-privilege
        name: "Principle of Least Privilege"
        description: "Grant minimum necessary permissions to users and services"
        control_type: procedural
        cost: low

  - slug: metadata-leakage
    name: "Metadata Leakage"
    description: "System metadata reveals sensitive information about infrastructure or users"
    stride_category: information_disclosure
    severity: medium
    applicable_to:
      - networking
      - backend
      - frontend
    countermeasures:
      - slug: header-hardening
        name: "HTTP Header Hardening"
        description: "Remove server version headers and unnecessary metadata"
        control_type: technical
        cost: low

      - slug: api-response-filtering
        name: "API Response Filtering"
        description: "Filter API responses to include only necessary fields"
        control_type: technical
        cost: low

  - slug: side-channel-attack
    name: "Side-Channel Information Leakage"
    description: "Attacker extracts information through timing, power, or other side channels"
    stride_category: information_disclosure
    severity: medium
    applicable_to:
      - backend
      - security
    countermeasures:
      - slug: constant-time-operations
        name: "Constant-Time Operations"
        description: "Use constant-time algorithms for cryptographic operations"
        control_type: technical
        cost: medium

      - slug: rate-limiting
        name: "Rate Limiting"
        description: "Rate limit requests to prevent timing-based enumeration"
        control_type: technical
        cost: low

  # ---------------------------------------------------------------------------
  # DENIAL OF SERVICE - Making a system unavailable
  # ---------------------------------------------------------------------------
  - slug: volumetric-dos
    name: "Volumetric DDoS Attack"
    description: "Attacker floods the system with traffic to exhaust bandwidth or resources"
    stride_category: denial_of_service
    severity: high
    applicable_to:
      - networking
      - frontend
      - backend
    countermeasures:
      - slug: ddos-protection
        name: "DDoS Protection Service"
        description: "Use cloud-based DDoS protection (AWS Shield, Cloudflare, Azure DDoS)"
        control_type: technical
        cost: medium

      - slug: rate-limiting-network
        name: "Network Rate Limiting"
        description: "Implement rate limiting at network edge"
        control_type: technical
        cost: low

      - slug: geo-blocking
        name: "Geographic Blocking"
        description: "Block traffic from regions where service is not offered"
        control_type: technical
        cost: low

  - slug: application-dos
    name: "Application-Layer DoS"
    description: "Attacker exploits application logic to consume excessive resources"
    stride_category: denial_of_service
    severity: high
    applicable_to:
      - backend
      - database
    countermeasures:
      - slug: api-rate-limiting
        name: "API Rate Limiting"
        description: "Limit requests per user/IP to prevent abuse"
        control_type: technical
        cost: low

      - slug: request-size-limits
        name: "Request Size Limits"
        description: "Enforce maximum request body and file upload sizes"
        control_type: technical
        cost: low

      - slug: query-complexity-limits
        name: "Query Complexity Limits"
        description: "Limit database query complexity and execution time"
        control_type: technical
        cost: medium

      - slug: circuit-breakers
        name: "Circuit Breakers"
        description: "Implement circuit breakers to prevent cascade failures"
        control_type: technical
        cost: medium

  - slug: resource-exhaustion
    name: "Resource Exhaustion"
    description: "Attacker exhausts system resources (CPU, memory, disk, connections)"
    stride_category: denial_of_service
    severity: high
    applicable_to:
      - compute
      - database
      - backend
    countermeasures:
      - slug: resource-quotas
        name: "Resource Quotas"
        description: "Set CPU, memory, and storage limits for applications"
        control_type: technical
        cost: low

      - slug: connection-pooling
        name: "Connection Pooling"
        description: "Use connection pools with maximum limits"
        control_type: technical
        cost: low

      - slug: auto-scaling
        name: "Auto-Scaling"
        description: "Automatically scale resources based on demand"
        control_type: technical
        cost: medium

      - slug: resource-monitoring
        name: "Resource Monitoring and Alerting"
        description: "Monitor resource usage and alert on anomalies"
        control_type: technical
        cost: low

  - slug: dependency-failure
    name: "Dependency Failure"
    description: "Critical dependency becomes unavailable, causing service outage"
    stride_category: denial_of_service
    severity: medium
    applicable_to:
      - backend
      - messaging
      - database
    countermeasures:
      - slug: redundancy
        name: "Redundancy"
        description: "Deploy redundant instances of critical dependencies"
        control_type: technical
        cost: high

      - slug: graceful-degradation
        name: "Graceful Degradation"
        description: "Design systems to continue operating with reduced functionality"
        control_type: technical
        cost: medium

      - slug: timeout-configuration
        name: "Timeout Configuration"
        description: "Configure appropriate timeouts for all external calls"
        control_type: technical
        cost: low

      - slug: fallback-mechanisms
        name: "Fallback Mechanisms"
        description: "Implement fallback options when primary services fail"
        control_type: technical
        cost: medium

  # ---------------------------------------------------------------------------
  # ELEVATION OF PRIVILEGE - Gaining unauthorized capabilities
  # ---------------------------------------------------------------------------
  - slug: privilege-escalation
    name: "Privilege Escalation"
    description: "Attacker gains higher privileges than authorized through vulnerabilities"
    stride_category: elevation_of_privilege
    severity: critical
    applicable_to:
      - backend
      - compute
      - auth
    countermeasures:
      - slug: least-privilege-principle
        name: "Principle of Least Privilege"
        description: "Grant minimum necessary permissions to all users and services"
        control_type: procedural
        cost: low

      - slug: privilege-separation
        name: "Privilege Separation"
        description: "Run services with minimal required privileges"
        control_type: technical
        cost: medium

      - slug: regular-access-reviews
        name: "Regular Access Reviews"
        description: "Periodically review and revoke unnecessary access"
        control_type: procedural
        cost: medium

  - slug: insecure-deserialization
    name: "Insecure Deserialization"
    description: "Attacker exploits deserialization to execute arbitrary code"
    stride_category: elevation_of_privilege
    severity: critical
    applicable_to:
      - backend
    countermeasures:
      - slug: safe-deserialization
        name: "Safe Deserialization"
        description: "Use safe serialization formats (JSON) and validate before deserializing"
        control_type: technical
        cost: low

      - slug: input-type-validation
        name: "Input Type Validation"
        description: "Validate expected types before processing deserialized data"
        control_type: technical
        cost: low

  - slug: container-escape
    name: "Container Escape"
    description: "Attacker breaks out of container isolation to access host system"
    stride_category: elevation_of_privilege
    severity: critical
    applicable_to:
      - compute
      - infrastructure
    countermeasures:
      - slug: container-hardening
        name: "Container Hardening"
        description: "Run containers as non-root, drop capabilities, use seccomp"
        control_type: technical
        cost: medium

      - slug: container-runtime-security
        name: "Container Runtime Security"
        description: "Use secure container runtimes (gVisor, Kata Containers)"
        control_type: technical
        cost: high

      - slug: pod-security-policies
        name: "Pod Security Policies"
        description: "Enforce Kubernetes pod security standards"
        control_type: technical
        cost: medium

  - slug: iam-misconfiguration
    name: "IAM Misconfiguration"
    description: "Overly permissive IAM policies allow unauthorized actions"
    stride_category: elevation_of_privilege
    severity: high
    applicable_to:
      - auth
      - infrastructure
    countermeasures:
      - slug: iam-policy-review
        name: "IAM Policy Review"
        description: "Regularly audit IAM policies for excessive permissions"
        control_type: procedural
        cost: medium

      - slug: iam-policy-constraints
        name: "IAM Policy Constraints"
        description: "Use policy conditions to restrict when permissions apply"
        control_type: technical
        cost: low

      - slug: service-control-policies
        name: "Service Control Policies"
        description: "Use organization-level policies to prevent dangerous actions"
        control_type: technical
        cost: medium

  - slug: insider-threat
    name: "Insider Threat"
    description: "Malicious or negligent insider abuses authorized access"
    stride_category: elevation_of_privilege
    severity: high
    applicable_to:
      - backend
      - database
      - infrastructure
    countermeasures:
      - slug: separation-of-duties
        name: "Separation of Duties"
        description: "Require multiple people for critical operations"
        control_type: procedural
        cost: medium

      - slug: user-activity-monitoring
        name: "User Activity Monitoring"
        description: "Monitor and audit user activities for suspicious behavior"
        control_type: technical
        cost: medium

      - slug: just-in-time-access
        name: "Just-in-Time Access"
        description: "Grant elevated access only when needed, with automatic expiration"
        control_type: technical
        cost: high

      - slug: background-checks
        name: "Background Checks"
        description: "Conduct background checks for personnel with sensitive access"
        control_type: procedural
        cost: medium

  - slug: ssrf
    name: "Server-Side Request Forgery (SSRF)"
    description: "Attacker tricks server into making requests to internal resources"
    stride_category: elevation_of_privilege
    severity: high
    applicable_to:
      - backend
      - networking
    countermeasures:
      - slug: ssrf-protection
        name: "SSRF Protection"
        description: "Validate and whitelist allowed destination URLs"
        control_type: technical
        cost: low

      - slug: network-segmentation
        name: "Network Segmentation"
        description: "Isolate internal services from externally-facing applications"
        control_type: technical
        cost: medium

      - slug: metadata-service-protection
        name: "Metadata Service Protection"
        description: "Block access to cloud metadata services from applications"
        control_type: technical
        cost: low
