template:
  slug: open-banking-psd2
  name: "Open Banking / PSD2 API Platform"
  description: "Open Banking platform enabling third-party access to account data and payment initiation under PSD2 regulations"
  category: api
  diagram_type: level1

canvas_data:
  nodes:
    # External actors
    - id: "actor-customer"
      type: "humanActor"
      position: { x: 50, y: 180 }
      data:
        label: "Bank Customer"
        actorType: "user"
        description: "Account holder authorizing TPP access"

    - id: "actor-tpp"
      type: "humanActor"
      position: { x: 50, y: 450 }
      data:
        label: "Third Party Provider"
        actorType: "external"
        description: "Fintech app (AISP/PISP) accessing bank APIs"

    - id: "actor-regulator"
      type: "humanActor"
      position: { x: 1150, y: 550 }
      data:
        label: "Regulatory Authority"
        actorType: "external"
        description: "National competent authority / Open Banking directory"

    # System boundary - Bank Infrastructure
    - id: "sb-bank"
      type: "systemScope"
      position: { x: 200, y: 50 }
      style: { width: 920, height: 580 }
      data:
        label: "Bank Open Banking Infrastructure"
        owner: "Digital Channels Team"
        classification: "Production"

    # Trust boundary - DMZ / API Gateway Zone
    - id: "tb-dmz"
      type: "trustZone"
      parentId: "sb-bank"
      position: { x: 30, y: 60 }
      style: { width: 280, height: 300 }
      data:
        label: "API Gateway Zone"
        zoneType: "dmz"
        technology: "DMZ Network"

    # Trust boundary - Open Banking Services
    - id: "tb-openbanking"
      type: "trustZone"
      parentId: "sb-bank"
      position: { x: 340, y: 60 }
      style: { width: 280, height: 480 }
      data:
        label: "Open Banking Services"
        zoneType: "privateSecured"
        technology: "Internal Network"

    # Trust boundary - Core Banking
    - id: "tb-core"
      type: "trustZone"
      parentId: "sb-bank"
      position: { x: 650, y: 60 }
      style: { width: 240, height: 480 }
      data:
        label: "Core Banking Zone"
        zoneType: "internal"
        technology: "Secured Internal"

    # API Gateway Zone components
    - id: "process-apigw"
      type: "process"
      parentId: "tb-dmz"
      position: { x: 40, y: 50 }
      data:
        label: "API Gateway"
        technology: "Kong / Apigee"
        description: "Rate limiting, request validation, routing"

    - id: "process-oauth"
      type: "process"
      parentId: "tb-dmz"
      position: { x: 40, y: 170 }
      data:
        label: "OAuth 2.0 Server"
        technology: "OpenID Connect"
        description: "Token issuance and validation"

    # Open Banking Services
    - id: "process-consent"
      type: "process"
      parentId: "tb-openbanking"
      position: { x: 40, y: 50 }
      data:
        label: "Consent Management"
        technology: "Java / Spring"
        description: "Customer consent lifecycle management"

    - id: "process-ais"
      type: "process"
      parentId: "tb-openbanking"
      position: { x: 40, y: 160 }
      data:
        label: "Account Information Service"
        technology: "Java / Spring"
        description: "Read-only access to account data (AISP)"

    - id: "process-pis"
      type: "process"
      parentId: "tb-openbanking"
      position: { x: 40, y: 270 }
      data:
        label: "Payment Initiation Service"
        technology: "Java / Spring"
        description: "Initiate payments on behalf of customer (PISP)"

    - id: "datastore-consent-db"
      type: "datastore"
      parentId: "tb-openbanking"
      position: { x: 40, y: 380 }
      data:
        label: "Consent Store"
        technology: "PostgreSQL"
        description: "Active consents and permissions"
        dataSensitivity: "confidential"

    # Core Banking Zone
    - id: "process-account-api"
      type: "process"
      parentId: "tb-core"
      position: { x: 40, y: 50 }
      data:
        label: "Account API"
        technology: "Internal API"
        description: "Core banking account interface"

    - id: "process-payment-api"
      type: "process"
      parentId: "tb-core"
      position: { x: 40, y: 160 }
      data:
        label: "Payment API"
        technology: "Internal API"
        description: "Core banking payment interface"

    - id: "datastore-accounts"
      type: "datastore"
      parentId: "tb-core"
      position: { x: 40, y: 270 }
      data:
        label: "Account Database"
        technology: "Oracle"
        description: "Customer accounts and balances"
        dataSensitivity: "confidential"

    - id: "datastore-audit"
      type: "datastore"
      parentId: "tb-core"
      position: { x: 40, y: 380 }
      data:
        label: "Audit Log"
        technology: "Elasticsearch"
        description: "API access audit trail"
        dataSensitivity: "internal"

    # TPP Registry (external but connected)
    - id: "process-tpp-registry"
      type: "process"
      parentId: "sb-bank"
      position: { x: 400, y: 560 }
      data:
        label: "TPP Registry Client"
        technology: "Integration Service"
        description: "Validates TPP certificates and permissions"

  edges:
    # Customer flows
    - id: "edge-customer-apigw"
      source: "actor-customer"
      target: "process-apigw"
      type: "dataFlow"
      data:
        label: "Consent Authorization"
        protocol: "HTTPS"
        encrypted: true
        authenticated: true

    - id: "edge-customer-oauth"
      source: "actor-customer"
      target: "process-oauth"
      type: "dataFlow"
      data:
        label: "SCA Authentication"
        protocol: "HTTPS"
        encrypted: true
        description: "Strong Customer Authentication"

    # TPP flows
    - id: "edge-tpp-apigw"
      source: "actor-tpp"
      target: "process-apigw"
      type: "dataFlow"
      data:
        label: "API Requests"
        protocol: "HTTPS + mTLS"
        encrypted: true
        authenticated: true
        description: "eIDAS certificate authentication"

    - id: "edge-tpp-oauth"
      source: "actor-tpp"
      target: "process-oauth"
      type: "dataFlow"
      data:
        label: "Token Request"
        protocol: "HTTPS"
        encrypted: true

    # API Gateway routing
    - id: "edge-apigw-consent"
      source: "process-apigw"
      target: "process-consent"
      type: "dataFlow"
      data:
        label: "Consent Requests"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-apigw-ais"
      source: "process-apigw"
      target: "process-ais"
      type: "dataFlow"
      data:
        label: "Account Queries"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-apigw-pis"
      source: "process-apigw"
      target: "process-pis"
      type: "dataFlow"
      data:
        label: "Payment Requests"
        protocol: "HTTPS"
        encrypted: true

    # OAuth token validation
    - id: "edge-apigw-oauth"
      source: "process-apigw"
      target: "process-oauth"
      type: "dataFlow"
      data:
        label: "Token Validation"
        protocol: "HTTPS"
        encrypted: true

    # Consent checks
    - id: "edge-ais-consent"
      source: "process-ais"
      target: "process-consent"
      type: "dataFlow"
      data:
        label: "Verify Consent"
        protocol: "gRPC"
        encrypted: true

    - id: "edge-pis-consent"
      source: "process-pis"
      target: "process-consent"
      type: "dataFlow"
      data:
        label: "Verify Consent"
        protocol: "gRPC"
        encrypted: true

    # Consent storage
    - id: "edge-consent-db"
      source: "process-consent"
      target: "datastore-consent-db"
      type: "dataFlow"
      data:
        label: "Consent Records"
        protocol: "SQL/TLS"
        encrypted: true

    # Core banking integration
    - id: "edge-ais-account"
      source: "process-ais"
      target: "process-account-api"
      type: "dataFlow"
      data:
        label: "Account Data Request"
        protocol: "HTTPS"
        encrypted: true
        dataClassification: ["PII", "Financial"]

    - id: "edge-pis-payment"
      source: "process-pis"
      target: "process-payment-api"
      type: "dataFlow"
      data:
        label: "Payment Instruction"
        protocol: "HTTPS"
        encrypted: true
        dataClassification: ["Financial"]

    # Core data access
    - id: "edge-account-db"
      source: "process-account-api"
      target: "datastore-accounts"
      type: "dataFlow"
      data:
        label: "Account Query"
        protocol: "SQL/TLS"
        encrypted: true

    - id: "edge-payment-db"
      source: "process-payment-api"
      target: "datastore-accounts"
      type: "dataFlow"
      data:
        label: "Balance Update"
        protocol: "SQL/TLS"
        encrypted: true

    # Audit logging
    - id: "edge-ais-audit"
      source: "process-ais"
      target: "datastore-audit"
      type: "dataFlow"
      data:
        label: "Access Log"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-pis-audit"
      source: "process-pis"
      target: "datastore-audit"
      type: "dataFlow"
      data:
        label: "Payment Log"
        protocol: "HTTPS"
        encrypted: true

    # TPP Registry
    - id: "edge-apigw-registry"
      source: "process-apigw"
      target: "process-tpp-registry"
      type: "dataFlow"
      data:
        label: "TPP Validation"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-registry-regulator"
      source: "process-tpp-registry"
      target: "actor-regulator"
      type: "dataFlow"
      data:
        label: "Directory Lookup"
        protocol: "HTTPS"
        encrypted: true
        description: "Verify TPP registration status"
