template:
  slug: card-payment-processing
  name: "Card Payment Processing"
  description: "End-to-end card payment processing flow with PCI-DSS compliant cardholder data environment"
  category: api
  diagram_type: level1

canvas_data:
  nodes:
    # External actors
    - id: "actor-cardholder"
      type: "actor"
      position: { x: 50, y: 150 }
      data:
        label: "Cardholder"
        actorType: "user"
        description: "Customer making card payment"

    - id: "actor-merchant"
      type: "actor"
      position: { x: 50, y: 400 }
      data:
        label: "Merchant POS/eCommerce"
        actorType: "external"
        description: "Point of sale or online checkout"

    - id: "actor-card-network"
      type: "actor"
      position: { x: 1200, y: 280 }
      data:
        label: "Card Network"
        actorType: "external"
        description: "Visa / Mastercard / Amex"

    # System boundary - Bank Card Processing
    - id: "sb-bank"
      type: "systemScope"
      position: { x: 200, y: 50 }
      style: { width: 970, height: 600 }
      data:
        label: "Bank Card Processing Infrastructure"
        owner: "Card Services Team"
        classification: "PCI-DSS Scope"

    # Trust boundary - CDE (Cardholder Data Environment)
    - id: "tb-cde"
      type: "trustBoundary"
      parentId: "sb-bank"
      position: { x: 30, y: 60 }
      style: { width: 340, height: 380 }
      data:
        label: "Cardholder Data Environment"
        boundaryType: "privateSecured"
        technology: "PCI-DSS Zone"

    # Trust boundary - Payment Processing
    - id: "tb-processing"
      type: "trustBoundary"
      parentId: "sb-bank"
      position: { x: 400, y: 60 }
      style: { width: 280, height: 380 }
      data:
        label: "Payment Processing Zone"
        boundaryType: "privateSecured"
        technology: "Internal Secured"

    # Trust boundary - HSM Zone
    - id: "tb-hsm"
      type: "trustBoundary"
      parentId: "sb-bank"
      position: { x: 710, y: 60 }
      style: { width: 230, height: 200 }
      data:
        label: "HSM Zone"
        boundaryType: "internal"
        technology: "Hardware Security"

    # Trust boundary - Settlement
    - id: "tb-settlement"
      type: "trustBoundary"
      parentId: "sb-bank"
      position: { x: 710, y: 290 }
      style: { width: 230, height: 150 }
      data:
        label: "Settlement Zone"
        boundaryType: "privateSecured"
        technology: "Batch Processing"

    # CDE Components
    - id: "process-gateway"
      type: "process"
      parentId: "tb-cde"
      position: { x: 40, y: 50 }
      data:
        label: "Payment Gateway"
        technology: "Gateway Service"
        description: "Receives card data, initiates tokenization"

    - id: "process-tokenization"
      type: "process"
      parentId: "tb-cde"
      position: { x: 40, y: 160 }
      data:
        label: "Tokenization Service"
        technology: "Token Vault"
        description: "Replaces PAN with token"

    - id: "datastore-token-vault"
      type: "datastore"
      parentId: "tb-cde"
      position: { x: 40, y: 270 }
      data:
        label: "Token Vault"
        technology: "Encrypted Database"
        description: "PAN-to-token mapping (encrypted)"
        dataSensitivity: "confidential"

    # Payment Processing Components
    - id: "process-authorization"
      type: "process"
      parentId: "tb-processing"
      position: { x: 40, y: 50 }
      data:
        label: "Authorization Engine"
        technology: "Real-time Processing"
        description: "Validates and authorizes transactions"

    - id: "process-fraud-scoring"
      type: "process"
      parentId: "tb-processing"
      position: { x: 40, y: 160 }
      data:
        label: "Fraud Scoring"
        technology: "ML Service"
        description: "Real-time fraud risk assessment"

    - id: "datastore-transactions"
      type: "datastore"
      parentId: "tb-processing"
      position: { x: 40, y: 270 }
      data:
        label: "Transaction Log"
        technology: "PostgreSQL"
        description: "Transaction records (tokenized)"
        dataSensitivity: "internal"

    # HSM Zone
    - id: "process-hsm"
      type: "process"
      parentId: "tb-hsm"
      position: { x: 40, y: 50 }
      data:
        label: "HSM Cluster"
        technology: "Thales/Utimaco HSM"
        description: "PIN translation, key management"

    - id: "datastore-keys"
      type: "datastore"
      parentId: "tb-hsm"
      position: { x: 40, y: 120 }
      data:
        label: "Key Store"
        technology: "HSM Internal"
        description: "Cryptographic keys"
        dataSensitivity: "confidential"

    # Settlement Zone
    - id: "process-settlement"
      type: "process"
      parentId: "tb-settlement"
      position: { x: 40, y: 40 }
      data:
        label: "Settlement Engine"
        technology: "Batch Processing"
        description: "End-of-day settlement batches"

    # Network interface (inside sb-bank but outside trust boundaries)
    - id: "process-network-interface"
      type: "process"
      parentId: "sb-bank"
      position: { x: 780, y: 470 }
      data:
        label: "Card Network Interface"
        technology: "ISO 8583"
        description: "Communication with card networks"

    # Monitoring
    - id: "process-monitoring"
      type: "process"
      parentId: "sb-bank"
      position: { x: 100, y: 480 }
      data:
        label: "PCI Monitoring"
        technology: "SIEM"
        description: "Security monitoring and alerting"

  edges:
    # Cardholder initiates payment
    - id: "edge-cardholder-merchant"
      source: "actor-cardholder"
      target: "actor-merchant"
      type: "dataFlow"
      data:
        label: "Card Present/Not Present"
        protocol: "EMV / HTTPS"
        encrypted: true

    # Merchant to gateway
    - id: "edge-merchant-gateway"
      source: "actor-merchant"
      target: "process-gateway"
      type: "dataFlow"
      data:
        label: "Payment Request"
        protocol: "HTTPS + TLS 1.3"
        encrypted: true
        dataClassification: ["PAN", "CVV"]
        description: "Full card data transmission"

    # Gateway to tokenization
    - id: "edge-gateway-token"
      source: "process-gateway"
      target: "process-tokenization"
      type: "dataFlow"
      data:
        label: "Tokenize PAN"
        protocol: "Internal API"
        encrypted: true
        dataClassification: ["PAN"]

    # Token vault storage
    - id: "edge-token-vault"
      source: "process-tokenization"
      target: "datastore-token-vault"
      type: "dataFlow"
      data:
        label: "Store Mapping"
        protocol: "SQL/TLS"
        encrypted: true
        dataClassification: ["PAN"]

    # Gateway to authorization (with token)
    - id: "edge-gateway-auth"
      source: "process-gateway"
      target: "process-authorization"
      type: "dataFlow"
      data:
        label: "Auth Request (tokenized)"
        protocol: "Internal API"
        encrypted: true

    # Fraud check
    - id: "edge-auth-fraud"
      source: "process-authorization"
      target: "process-fraud-scoring"
      type: "dataFlow"
      data:
        label: "Risk Assessment"
        protocol: "gRPC"
        encrypted: true

    # HSM for PIN/crypto
    - id: "edge-gateway-hsm"
      source: "process-gateway"
      target: "process-hsm"
      type: "dataFlow"
      data:
        label: "PIN Translation"
        protocol: "HSM Protocol"
        encrypted: true
        dataClassification: ["PIN Block"]

    - id: "edge-auth-hsm"
      source: "process-authorization"
      target: "process-hsm"
      type: "dataFlow"
      data:
        label: "Crypto Operations"
        protocol: "HSM Protocol"
        encrypted: true

    # HSM key access
    - id: "edge-hsm-keys"
      source: "process-hsm"
      target: "datastore-keys"
      type: "dataFlow"
      data:
        label: "Key Access"
        protocol: "Internal"
        encrypted: true

    # Transaction logging
    - id: "edge-auth-log"
      source: "process-authorization"
      target: "datastore-transactions"
      type: "dataFlow"
      data:
        label: "Log Transaction"
        protocol: "SQL/TLS"
        encrypted: true

    # Network communication
    - id: "edge-auth-network"
      source: "process-authorization"
      target: "process-network-interface"
      type: "dataFlow"
      data:
        label: "Auth Message"
        protocol: "ISO 8583"
        encrypted: true

    - id: "edge-network-cardnetwork"
      source: "process-network-interface"
      target: "actor-card-network"
      type: "dataFlow"
      data:
        label: "Network Request"
        protocol: "ISO 8583 / HTTPS"
        encrypted: true
        description: "To Visa/Mastercard/etc"

    # Settlement flows
    - id: "edge-auth-settlement"
      source: "process-authorization"
      target: "process-settlement"
      type: "dataFlow"
      data:
        label: "Approved Transactions"
        protocol: "Message Queue"
        encrypted: true

    - id: "edge-settlement-network"
      source: "process-settlement"
      target: "process-network-interface"
      type: "dataFlow"
      data:
        label: "Settlement Batch"
        protocol: "ISO 8583"
        encrypted: true

    # Monitoring
    - id: "edge-gateway-monitor"
      source: "process-gateway"
      target: "process-monitoring"
      type: "dataFlow"
      data:
        label: "Security Events"
        protocol: "Syslog/TLS"
        encrypted: true

    - id: "edge-auth-monitor"
      source: "process-authorization"
      target: "process-monitoring"
      type: "dataFlow"
      data:
        label: "Auth Events"
        protocol: "Syslog/TLS"
        encrypted: true

    - id: "edge-hsm-monitor"
      source: "process-hsm"
      target: "process-monitoring"
      type: "dataFlow"
      data:
        label: "HSM Audit Log"
        protocol: "Syslog/TLS"
        encrypted: true
