template:
  slug: fraud-detection
  name: "Real-Time Fraud Detection"
  description: "Event-driven fraud detection and transaction monitoring system with ML scoring and case management"
  category: api
  diagram_type: level1

canvas_data:
  nodes:
    # External actors
    - id: "actor-channels"
      type: "humanActor"
      position: { x: 50, y: 200 }
      data:
        label: "Banking Channels"
        actorType: "external"
        description: "Mobile, Web, ATM, Branch systems"

    - id: "actor-analyst"
      type: "humanActor"
      position: { x: 50, y: 480 }
      data:
        label: "Fraud Analyst"
        actorType: "user"
        description: "Investigates alerts and manages cases"

    - id: "actor-watchlist"
      type: "humanActor"
      position: { x: 1150, y: 100 }
      data:
        label: "External Watchlists"
        actorType: "external"
        description: "OFAC, sanctions lists, fraud consortiums"

    - id: "actor-customer"
      type: "humanActor"
      position: { x: 1150, y: 500 }
      data:
        label: "Customer"
        actorType: "user"
        description: "Receives fraud alerts"

    # System boundary - Fraud Detection Platform
    - id: "sb-fraud"
      type: "systemScope"
      position: { x: 200, y: 50 }
      style: { width: 920, height: 580 }
      data:
        label: "Fraud Detection Platform"
        owner: "Financial Crime Team"
        classification: "Production"

    # Trust boundary - Ingestion Layer
    - id: "tb-ingestion"
      type: "trustBoundary"
      parentId: "sb-fraud"
      position: { x: 30, y: 60 }
      style: { width: 200, height: 250 }
      data:
        label: "Event Ingestion"
        boundaryType: "dmz"
        technology: "Kafka Cluster"

    # Trust boundary - Processing Layer
    - id: "tb-processing"
      type: "trustBoundary"
      parentId: "sb-fraud"
      position: { x: 260, y: 60 }
      style: { width: 380, height: 350 }
      data:
        label: "Real-Time Processing"
        boundaryType: "privateSecured"
        technology: "Stream Processing"

    # Trust boundary - Data Layer
    - id: "tb-data"
      type: "trustBoundary"
      parentId: "sb-fraud"
      position: { x: 670, y: 60 }
      style: { width: 220, height: 350 }
      data:
        label: "Data Layer"
        boundaryType: "privateSecured"
        technology: "Secured Storage"

    # Trust boundary - Investigation
    - id: "tb-investigation"
      type: "trustBoundary"
      parentId: "sb-fraud"
      position: { x: 260, y: 440 }
      style: { width: 380, height: 160 }
      data:
        label: "Investigation Layer"
        boundaryType: "privateSecured"
        technology: "Case Management"

    # Ingestion Layer
    - id: "process-event-hub"
      type: "process"
      parentId: "tb-ingestion"
      position: { x: 30, y: 50 }
      data:
        label: "Event Hub"
        technology: "Kafka"
        description: "Transaction event ingestion"

    - id: "process-enrichment"
      type: "process"
      parentId: "tb-ingestion"
      position: { x: 30, y: 150 }
      data:
        label: "Event Enrichment"
        technology: "Kafka Streams"
        description: "Add context to raw events"

    # Processing Layer
    - id: "process-rules-engine"
      type: "process"
      parentId: "tb-processing"
      position: { x: 30, y: 50 }
      data:
        label: "Rules Engine"
        technology: "Drools / Custom"
        description: "Deterministic fraud rules"

    - id: "process-ml-scoring"
      type: "process"
      parentId: "tb-processing"
      position: { x: 200, y: 50 }
      data:
        label: "ML Scoring Service"
        technology: "Python / TensorFlow"
        description: "Real-time fraud probability scoring"

    - id: "process-sanctions"
      type: "process"
      parentId: "tb-processing"
      position: { x: 30, y: 160 }
      data:
        label: "Sanctions Screening"
        technology: "Screening Engine"
        description: "OFAC and sanctions list matching"

    - id: "process-decision"
      type: "process"
      parentId: "tb-processing"
      position: { x: 200, y: 160 }
      data:
        label: "Decision Engine"
        technology: "Decision Service"
        description: "Approve / Review / Block"

    - id: "process-alert-generator"
      type: "process"
      parentId: "tb-processing"
      position: { x: 115, y: 260 }
      data:
        label: "Alert Generator"
        technology: "Event Service"
        description: "Creates alerts for review queue"

    # Data Layer
    - id: "datastore-customer-profile"
      type: "datastore"
      parentId: "tb-data"
      position: { x: 30, y: 50 }
      data:
        label: "Customer Profiles"
        technology: "Redis / PostgreSQL"
        description: "Behavioral baselines and history"
        dataSensitivity: "confidential"

    - id: "datastore-model-store"
      type: "datastore"
      parentId: "tb-data"
      position: { x: 30, y: 140 }
      data:
        label: "Model Store"
        technology: "MLflow / S3"
        description: "ML model artifacts and features"
        dataSensitivity: "internal"

    - id: "datastore-alert-db"
      type: "datastore"
      parentId: "tb-data"
      position: { x: 30, y: 230 }
      data:
        label: "Alert Database"
        technology: "PostgreSQL"
        description: "Alerts and investigation data"
        dataSensitivity: "confidential"

    # Investigation Layer
    - id: "process-case-management"
      type: "process"
      parentId: "tb-investigation"
      position: { x: 30, y: 50 }
      data:
        label: "Case Management"
        technology: "Web Application"
        description: "Analyst workbench for investigations"

    - id: "process-notification"
      type: "process"
      parentId: "tb-investigation"
      position: { x: 200, y: 50 }
      data:
        label: "Notification Service"
        technology: "Messaging Service"
        description: "Customer alerts (SMS, Push, Email)"

    # SAR Reporting (inside sb-fraud)
    - id: "process-sar"
      type: "process"
      parentId: "sb-fraud"
      position: { x: 700, y: 470 }
      data:
        label: "SAR Reporting"
        technology: "Reporting Service"
        description: "Suspicious Activity Report filing"

  edges:
    # Channel ingestion
    - id: "edge-channels-hub"
      source: "actor-channels"
      target: "process-event-hub"
      type: "dataFlow"
      data:
        label: "Transaction Events"
        protocol: "Kafka / HTTPS"
        encrypted: true
        dataClassification: ["PII", "Financial"]

    # Event enrichment
    - id: "edge-hub-enrich"
      source: "process-event-hub"
      target: "process-enrichment"
      type: "dataFlow"
      data:
        label: "Raw Events"
        protocol: "Kafka"
        encrypted: true

    # Enrichment to processing
    - id: "edge-enrich-rules"
      source: "process-enrichment"
      target: "process-rules-engine"
      type: "dataFlow"
      data:
        label: "Enriched Events"
        protocol: "Kafka"
        encrypted: true

    - id: "edge-enrich-ml"
      source: "process-enrichment"
      target: "process-ml-scoring"
      type: "dataFlow"
      data:
        label: "Feature Vector"
        protocol: "Kafka"
        encrypted: true

    - id: "edge-enrich-sanctions"
      source: "process-enrichment"
      target: "process-sanctions"
      type: "dataFlow"
      data:
        label: "Party Data"
        protocol: "Kafka"
        encrypted: true

    # Rules and ML to decision
    - id: "edge-rules-decision"
      source: "process-rules-engine"
      target: "process-decision"
      type: "dataFlow"
      data:
        label: "Rule Results"
        protocol: "Internal"
        encrypted: true

    - id: "edge-ml-decision"
      source: "process-ml-scoring"
      target: "process-decision"
      type: "dataFlow"
      data:
        label: "Risk Score"
        protocol: "gRPC"
        encrypted: true

    - id: "edge-sanctions-decision"
      source: "process-sanctions"
      target: "process-decision"
      type: "dataFlow"
      data:
        label: "Screening Result"
        protocol: "Internal"
        encrypted: true

    # Decision to alert
    - id: "edge-decision-alert"
      source: "process-decision"
      target: "process-alert-generator"
      type: "dataFlow"
      data:
        label: "Flagged Transactions"
        protocol: "Internal"
        encrypted: true

    # Data layer access
    - id: "edge-enrich-profile"
      source: "process-enrichment"
      target: "datastore-customer-profile"
      type: "dataFlow"
      data:
        label: "Profile Lookup"
        protocol: "Redis/TLS"
        encrypted: true

    - id: "edge-ml-model"
      source: "process-ml-scoring"
      target: "datastore-model-store"
      type: "dataFlow"
      data:
        label: "Load Model"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-alert-db"
      source: "process-alert-generator"
      target: "datastore-alert-db"
      type: "dataFlow"
      data:
        label: "Store Alert"
        protocol: "SQL/TLS"
        encrypted: true

    # External watchlist
    - id: "edge-sanctions-watchlist"
      source: "process-sanctions"
      target: "actor-watchlist"
      type: "dataFlow"
      data:
        label: "Watchlist Query"
        protocol: "HTTPS"
        encrypted: true
        description: "OFAC, EU sanctions, PEP lists"

    # Investigation flows
    - id: "edge-analyst-case"
      source: "actor-analyst"
      target: "process-case-management"
      type: "dataFlow"
      data:
        label: "Investigation Actions"
        protocol: "HTTPS"
        encrypted: true
        authenticated: true

    - id: "edge-case-alerts"
      source: "process-case-management"
      target: "datastore-alert-db"
      type: "dataFlow"
      data:
        label: "Alert Review"
        protocol: "SQL/TLS"
        encrypted: true

    - id: "edge-case-profile"
      source: "process-case-management"
      target: "datastore-customer-profile"
      type: "dataFlow"
      data:
        label: "Customer History"
        protocol: "HTTPS"
        encrypted: true

    # Customer notification
    - id: "edge-alert-notification"
      source: "process-alert-generator"
      target: "process-notification"
      type: "dataFlow"
      data:
        label: "Alert Trigger"
        protocol: "Message Queue"
        encrypted: true

    - id: "edge-case-notification"
      source: "process-case-management"
      target: "process-notification"
      type: "dataFlow"
      data:
        label: "Case Update"
        protocol: "Message Queue"
        encrypted: true

    - id: "edge-notification-customer"
      source: "process-notification"
      target: "actor-customer"
      type: "dataFlow"
      data:
        label: "Fraud Alert"
        protocol: "SMS / Push / Email"
        encrypted: true

    # SAR reporting
    - id: "edge-case-sar"
      source: "process-case-management"
      target: "process-sar"
      type: "dataFlow"
      data:
        label: "SAR Filing"
        protocol: "Internal"
        encrypted: true
        description: "Suspicious Activity Reports"

    # Decision back to channels (real-time response)
    - id: "edge-decision-channels"
      source: "process-decision"
      target: "actor-channels"
      type: "dataFlow"
      data:
        label: "Auth Decision"
        protocol: "HTTPS"
        encrypted: true
        description: "Allow / Block / Step-up"
