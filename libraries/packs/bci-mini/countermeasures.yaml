countermeasures:
  # ============================================================================
  # Neural Headset Countermeasures
  # ============================================================================
  - id: headset-signal-authentication
    name: Neural Signal Authentication
    description: |
      Cryptographic authentication of neural signal packets from the electrode
      array. Uses per-session keys to prevent injection of synthetic signals.
    control_type: preventive
    cost: medium

  - id: headset-encrypted-telemetry
    name: Encrypted Biotelemetry Link
    description: |
      AES-256 encryption of the wireless neural data link between headset
      and signal processor. Prevents eavesdropping on raw neural signals.
    control_type: preventive
    cost: medium

  - id: headset-secure-boot
    name: Headset Secure Boot
    description: |
      Cryptographic verification of headset firmware at boot using a hardware
      root of trust. Prevents execution of tampered firmware.
    control_type: preventive
    cost: high

  - id: headset-firmware-signing
    name: Firmware Code Signing
    description: |
      All firmware updates must be signed by the manufacturer's private key.
      Device rejects unsigned or improperly signed firmware images.
    control_type: preventive
    cost: medium

  # ============================================================================
  # Signal Processor Countermeasures
  # ============================================================================
  - id: sigproc-input-validation
    name: Neural Signal Input Validation
    description: |
      Statistical validation of incoming neural signals against physiologically
      plausible ranges. Rejects signals with non-biological spectral profiles
      or amplitude distributions.
    control_type: preventive
    cost: low

  - id: sigproc-realtime-watchdog
    name: Real-Time Processing Watchdog
    description: |
      Hardware watchdog timer that triggers a safe-state shutdown if signal
      processing exceeds the real-time deadline. Prevents latency-induced
      unsafe behavior in closed-loop systems.
    control_type: preventive
    cost: low

  - id: sigproc-calibration-encryption
    name: Calibration Data Encryption
    description: |
      Encrypt patient calibration profiles at rest on the edge processor
      using per-patient keys stored in a secure enclave.
    control_type: preventive
    cost: medium

  - id: sigproc-anomaly-detection
    name: Signal Anomaly Detection
    description: |
      Continuous monitoring for adversarial patterns in the neural signal
      stream. Flags statistically anomalous inputs for review and triggers
      safe-mode if confidence drops below threshold.
    control_type: detective
    cost: medium

  # ============================================================================
  # Decoder Engine Countermeasures
  # ============================================================================
  - id: decoder-model-signing
    name: Decoder Model Signing
    description: |
      Cryptographic signing and integrity verification of decoder model
      artifacts. Device rejects models that fail signature verification.
    control_type: preventive
    cost: medium

  - id: decoder-differential-privacy
    name: Differential Privacy for Training Data
    description: |
      Apply differential privacy mechanisms during model training to prevent
      reconstruction of individual patient neural patterns from the trained model.
    control_type: preventive
    cost: high

  - id: decoder-confidence-threshold
    name: Intent Confidence Threshold
    description: |
      Decoder only emits commands when classification confidence exceeds a
      clinician-configured threshold. Low-confidence outputs are discarded,
      preventing adversarial manipulation of marginal decisions.
    control_type: preventive
    cost: low

  - id: decoder-model-integrity-check
    name: Runtime Model Integrity Check
    description: |
      Periodic hash verification of the in-memory decoder model against a
      signed manifest. Detects runtime model corruption or hot-patching attacks.
    control_type: detective
    cost: low

  # ============================================================================
  # Stimulation Controller Countermeasures
  # ============================================================================
  - id: stim-hardware-charge-limiter
    name: Hardware Charge Limiter
    description: |
      Dedicated analog safety circuit that physically limits maximum charge
      delivery per phase, independent of software. Cannot be bypassed by
      firmware or software compromise.
    control_type: preventive
    cost: high

  - id: stim-dual-authorization
    name: Stimulation Dual Authorization
    description: |
      Stimulation requires concurrent authorization from both the decoder
      output and an independent safety monitor. Prevents single point of
      compromise from triggering stimulation.
    control_type: preventive
    cost: medium

  - id: stim-parameter-range-enforcement
    name: Stimulation Parameter Range Enforcement
    description: |
      Software-enforced bounds on all stimulation parameters (amplitude,
      frequency, pulse width, duty cycle) set by the prescribing clinician.
      Changes require re-authentication.
    control_type: preventive
    cost: low

  - id: stim-audit-logging
    name: Stimulation Event Audit Log
    description: |
      Tamper-evident logging of all stimulation events with timestamps,
      parameters, authorization source, and patient state at time of delivery.
    control_type: detective
    cost: low

  # ============================================================================
  # BCI Cloud Countermeasures
  # ============================================================================
  - id: cloud-phi-encryption
    name: Neural Data Encryption at Rest
    description: |
      AES-256 encryption of all neural recordings and patient data at rest.
      Key management via HSM with per-patient encryption keys.
    control_type: preventive
    cost: medium

  - id: cloud-access-control
    name: Role-Based Access Control
    description: |
      Fine-grained RBAC restricting neural data access by role (clinician,
      researcher, patient, engineer). Enforces need-to-know and minimum
      necessary access per HIPAA requirements.
    control_type: preventive
    cost: low

  - id: cloud-model-pipeline-security
    name: Secure Model Update Pipeline
    description: |
      CI/CD pipeline for decoder models with signed artifacts, reproducible
      builds, vulnerability scanning, and staged rollout with automatic
      rollback on anomaly detection.
    control_type: preventive
    cost: high

  - id: cloud-audit-trail
    name: Comprehensive Audit Trail
    description: |
      Immutable audit log of all data access, model deployments, configuration
      changes, and therapy sessions. Meets FDA 21 CFR Part 11 and HIPAA
      requirements for electronic records.
    control_type: detective
    cost: medium

  # ============================================================================
  # Neural Data Repository Countermeasures
  # ============================================================================
  - id: datastore-field-level-encryption
    name: Field-Level Neural Data Encryption
    description: |
      Encrypt sensitive neural data fields individually so that database
      administrators cannot access raw recordings without patient-specific
      decryption keys.
    control_type: preventive
    cost: high

  - id: datastore-immutable-recordings
    name: Immutable Neural Recordings
    description: |
      Write-once storage for neural recordings with cryptographic checksums.
      Prevents retroactive modification of therapy session data.
    control_type: preventive
    cost: medium

  - id: datastore-de-identification
    name: Neural Data De-Identification
    description: |
      Automated pipeline to strip direct identifiers and apply k-anonymity
      to neural datasets before use in research or model training.
    control_type: preventive
    cost: medium

  # ============================================================================
  # Data Flow Countermeasures
  # ============================================================================
  - id: dataflow-encrypted-channel
    name: Encrypted Communication Channel
    description: |
      TLS 1.3 or equivalent encryption for all data in transit between
      BCI components. Protects neural data and stimulation commands.
    control_type: preventive
    cost: low

  - id: dataflow-mutual-auth
    name: Mutual Device Authentication
    description: |
      Certificate-based mutual authentication between all BCI components.
      Prevents rogue devices from joining the signal chain.
    control_type: preventive
    cost: medium

  - id: dataflow-command-signing
    name: Stimulation Command Signing
    description: |
      All stimulation commands cryptographically signed by the decoder
      engine. Stimulation controller rejects unsigned commands.
    control_type: preventive
    cost: medium

  - id: dataflow-temporal-validation
    name: Temporal Nonce Validation
    description: |
      Timestamp and nonce-based freshness validation on all commands.
      Prevents replay of captured neural commands or stimulation sequences.
    control_type: preventive
    cost: low
