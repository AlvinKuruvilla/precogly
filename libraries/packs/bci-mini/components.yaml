components:
  # Neural Signal Acquisition
  - id: neural-headset
    name: Neural Signal Headset
    category: external
    type: EEG/ECoG Sensor Array
    provider: generic
    description: |
      Wearable or implantable electrode array that captures neural signals (EEG, ECoG, or
      intracortical recordings). Interfaces with the signal processor over a wireless or
      wired biotelemetry link. FDA Class II/III medical device.

  # Edge Processing
  - id: signal-processor
    name: Signal Processing Unit
    category: process
    type: Edge Compute Module
    provider: generic
    description: |
      Embedded processor that performs real-time filtering, artifact rejection, and
      feature extraction on raw neural signals. Runs on a dedicated SoC with
      deterministic latency requirements (< 50ms). Typically worn or body-mounted.

  # Decode Engine
  - id: decoder-engine
    name: Neural Decoder Engine
    category: process
    type: ML Inference Service
    provider: generic
    description: |
      Machine learning inference engine that translates processed neural features
      into user intent (motor commands, speech, cursor control). Runs calibrated
      per-patient decoder models with real-time constraints.

  # Stimulation Controller
  - id: stim-controller
    name: Stimulation Controller
    category: process
    type: Neurostimulation Module
    provider: generic
    description: |
      Closed-loop neurostimulation controller that delivers electrical or optical
      stimuli to neural tissue based on decoded signals. Safety-critical component
      with hardware charge-balancing and current limiters. FDA Class III.

  # Cloud Analytics
  - id: bci-cloud
    name: BCI Cloud Platform
    category: process
    type: Cloud Analytics
    provider: generic
    description: |
      Cloud-hosted platform for longitudinal neural data storage, model retraining,
      clinician dashboards, and remote device management. Handles PHI under
      HIPAA/GDPR requirements.

  # Patient Data Store
  - id: neural-datastore
    name: Neural Data Repository
    category: datastore
    type: Time-Series Database
    provider: generic
    description: |
      Secure storage for raw and processed neural recordings, session metadata,
      decoder model snapshots, and patient calibration profiles. Contains PHI
      and requires encryption at rest and field-level access controls.
