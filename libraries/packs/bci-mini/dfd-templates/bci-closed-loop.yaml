template:
  slug: bci-mini-closed-loop
  name: "Closed-Loop BCI System"
  description: "Brain-computer interface with neural recording, decoding, and closed-loop neurostimulation"
  category: iot
  diagram_type: level1

canvas_data:
  nodes:
    - id: "actor-patient"
      type: "humanActor"
      position: { x: 50, y: 200 }
      data:
        label: "Patient"
        actorType: "user"
        description: "BCI patient with implanted or wearable neural interface"

    - id: "actor-clinician"
      type: "humanActor"
      position: { x: 50, y: 450 }
      data:
        label: "Clinician"
        actorType: "user"
        description: "Prescribing clinician managing therapy parameters"

    - id: "sb-bci"
      type: "systemScope"
      position: { x: 200, y: 50 }
      style: { width: 750, height: 550 }
      data:
        label: "BCI System"

    - id: "tz-device"
      type: "trustZone"
      parentId: "sb-bci"
      position: { x: 30, y: 50 }
      style: { width: 320, height: 470 }
      data:
        label: "Device / Edge"
        zoneType: "zoneRestricted"
        technology: "Embedded SoC"

    - id: "tz-cloud"
      type: "trustZone"
      parentId: "sb-bci"
      position: { x: 400, y: 50 }
      style: { width: 320, height: 470 }
      data:
        label: "Cloud / Backend"
        zoneType: "zoneRestricted"
        technology: "HIPAA Cloud"

    - id: "node-headset"
      type: "process"
      parentId: "tz-device"
      position: { x: 50, y: 50 }
      data:
        label: "Neural Headset"
        component_ref: "neural-headset"
        description: "EEG/ECoG electrode array"

    - id: "node-sigproc"
      type: "process"
      parentId: "tz-device"
      position: { x: 50, y: 170 }
      data:
        label: "Signal Processor"
        component_ref: "signal-processor"
        description: "Real-time filtering and feature extraction"

    - id: "node-decoder"
      type: "process"
      parentId: "tz-device"
      position: { x: 50, y: 290 }
      data:
        label: "Decoder Engine"
        component_ref: "decoder-engine"
        description: "ML intent decoding"

    - id: "node-stim"
      type: "process"
      parentId: "tz-device"
      position: { x: 50, y: 410 }
      data:
        label: "Stim Controller"
        component_ref: "stim-controller"
        description: "Closed-loop neurostimulation"

    - id: "node-cloud"
      type: "process"
      parentId: "tz-cloud"
      position: { x: 50, y: 50 }
      data:
        label: "BCI Cloud Platform"
        component_ref: "bci-cloud"
        description: "Analytics, model training, remote management"

    - id: "node-datastore"
      type: "datastore"
      parentId: "tz-cloud"
      position: { x: 50, y: 250 }
      data:
        label: "Neural Data Repository"
        component_ref: "neural-datastore"
        description: "PHI storage for neural recordings"
        dataSensitivity: "confidential"

  edges:
    - id: "edge-patient-headset"
      source: "actor-patient"
      target: "node-headset"
      type: "dataFlow"
      data:
        label: "Neural Signals"
        protocol: "Biotelemetry"
        encrypted: false

    - id: "edge-headset-sigproc"
      source: "node-headset"
      target: "node-sigproc"
      type: "dataFlow"
      data:
        label: "Raw Neural Data"
        protocol: "BLE / Wired"
        encrypted: true

    - id: "edge-sigproc-decoder"
      source: "node-sigproc"
      target: "node-decoder"
      type: "dataFlow"
      data:
        label: "Extracted Features"
        protocol: "Internal Bus"
        encrypted: false

    - id: "edge-decoder-stim"
      source: "node-decoder"
      target: "node-stim"
      type: "dataFlow"
      data:
        label: "Stimulation Commands"
        protocol: "Internal Bus"
        encrypted: false

    - id: "edge-stim-patient"
      source: "node-stim"
      target: "actor-patient"
      type: "dataFlow"
      data:
        label: "Electrical Stimuli"
        protocol: "Direct Neural"
        encrypted: false

    - id: "edge-sigproc-cloud"
      source: "node-sigproc"
      target: "node-cloud"
      type: "dataFlow"
      data:
        label: "Session Data Upload"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-cloud-decoder"
      source: "node-cloud"
      target: "node-decoder"
      type: "dataFlow"
      data:
        label: "Model Updates (OTA)"
        protocol: "HTTPS"
        encrypted: true

    - id: "edge-cloud-datastore"
      source: "node-cloud"
      target: "node-datastore"
      type: "dataFlow"
      data:
        label: "Neural Data Storage"
        protocol: "TLS"
        encrypted: true

    - id: "edge-clinician-cloud"
      source: "actor-clinician"
      target: "node-cloud"
      type: "dataFlow"
      data:
        label: "Therapy Config / Dashboard"
        protocol: "HTTPS"
        encrypted: true
