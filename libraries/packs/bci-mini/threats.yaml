threats:
  # ============================================================================
  # Neural Headset Threats
  # ============================================================================
  - id: headset-signal-spoofing
    name: Neural Signal Spoofing
    description: |
      Adversary injects synthetic neural signals into the acquisition channel via
      electromagnetic interference or compromised electrodes, causing the decoder
      to interpret fabricated user intent.
    taxonomy_references:
      stride: [spoofing]
      capec: ["586"]
      cwe: [CWE-345]
      mitre-attack: [T1557]

  - id: headset-signal-eavesdropping
    name: Neural Signal Eavesdropping
    description: |
      Unauthorized interception of raw neural signals from the wireless telemetry
      link. Neural data can reveal cognitive state, emotional patterns, and
      potentially reconstruct viewed images or typed characters.
    taxonomy_references:
      stride: [information-disclosure]
      cwe: [CWE-319, CWE-200]
      mitre-attack: [T1040]

  - id: headset-firmware-tampering
    name: Headset Firmware Tampering
    description: |
      Malicious modification of headset firmware to alter signal acquisition
      parameters, disable safety interlocks, or introduce backdoors for
      persistent access to neural data streams.
    taxonomy_references:
      stride: [tampering]
      cwe: [CWE-494]
      mitre-attack: [T1542, T1195]

  # ============================================================================
  # Signal Processor Threats
  # ============================================================================
  - id: sigproc-adversarial-noise
    name: Adversarial Noise Injection
    description: |
      Carefully crafted noise patterns injected into the signal processing
      pipeline to manipulate feature extraction outputs without triggering
      artifact rejection filters.
    taxonomy_references:
      stride: [tampering]
      capec: ["88"]
      cwe: [CWE-20]
      mitre-attack: [T1190]

  - id: sigproc-latency-dos
    name: Signal Processing Latency Attack
    description: |
      Attacker induces computational overload on the edge processor, causing
      latency spikes that exceed the real-time deadline. In closed-loop BCI
      systems, this can disrupt motor control or trigger safety shutdowns.
    taxonomy_references:
      stride: [denial-of-service]
      cwe: [CWE-400]

  - id: sigproc-calibration-theft
    name: Calibration Profile Exfiltration
    description: |
      Extraction of patient-specific calibration data from the signal processor.
      Calibration profiles are biometric identifiers that can fingerprint
      individuals and enable targeted neural signal replay attacks.
    taxonomy_references:
      stride: [information-disclosure]
      cwe: [CWE-200, CWE-522]
      mitre-attack: [T1005]

  # ============================================================================
  # Decoder Engine Threats
  # ============================================================================
  - id: decoder-model-poisoning
    name: Decoder Model Poisoning
    description: |
      Adversary corrupts the neural decoder model during training or OTA update,
      causing systematic misinterpretation of user intent. In motor-control BCIs
      this could produce unintended limb movements.
    taxonomy_references:
      stride: [tampering]
      cwe: [CWE-494]
      mitre-attack: [T1195]

  - id: decoder-model-inversion
    name: Decoder Model Inversion Attack
    description: |
      Adversary queries or extracts the decoder model to reconstruct the training
      data (patient neural patterns), violating patient privacy and enabling
      targeted signal replay attacks.
    taxonomy_references:
      stride: [information-disclosure]
      capec: ["122"]
      cwe: [CWE-200]
      mitre-attack: [T1005]

  - id: decoder-intent-manipulation
    name: Intent Manipulation via Adversarial Input
    description: |
      Specially crafted inputs that exploit decoder model blind spots to produce
      attacker-chosen outputs — e.g., triggering a "confirm" action when the
      patient intended "cancel" in a communication BCI.
    taxonomy_references:
      stride: [elevation-of-privilege]
      cwe: [CWE-20]
      mitre-attack: [T1190]

  # ============================================================================
  # Stimulation Controller Threats
  # ============================================================================
  - id: stim-parameter-tampering
    name: Stimulation Parameter Tampering
    description: |
      Unauthorized modification of stimulation parameters (amplitude, frequency,
      pulse width) beyond safe thresholds. Could cause tissue damage, seizures,
      or pain in the patient. Safety-critical threat.
    taxonomy_references:
      stride: [tampering]
      cwe: [CWE-862]
      mitre-attack: [T1565]

  - id: stim-unauthorized-activation
    name: Unauthorized Stimulation Activation
    description: |
      Attacker triggers neurostimulation without valid decoded intent or clinician
      authorization. Could deliver unexpected stimuli causing involuntary movement,
      sensory disruption, or tissue damage.
    taxonomy_references:
      stride: [spoofing]
      cwe: [CWE-287, CWE-306]
      mitre-attack: [T1078]

  - id: stim-safety-interlock-bypass
    name: Safety Interlock Bypass
    description: |
      Circumvention of hardware or software safety limits on charge delivery,
      stimulation duration, or duty cycle. Removes the last line of defense
      against harmful stimulation levels.
    taxonomy_references:
      stride: [elevation-of-privilege]
      cwe: [CWE-862]
      mitre-attack: [T1548]

  # ============================================================================
  # BCI Cloud Platform Threats
  # ============================================================================
  - id: cloud-neural-data-breach
    name: Neural Data Breach
    description: |
      Unauthorized access to stored neural recordings and patient profiles.
      Neural data is sensitive PHI that can reveal cognitive states, neurological
      conditions, and serve as a biometric identifier.
    taxonomy_references:
      stride: [information-disclosure]
      capec: ["122"]
      cwe: [CWE-862, CWE-200]
      mitre-attack: [T1530]

  - id: cloud-model-supply-chain
    name: Model Update Supply Chain Attack
    description: |
      Compromised OTA model update pipeline delivers poisoned decoder models
      to patient devices. Affects all patients receiving the update, enabling
      wide-scale intent manipulation.
    taxonomy_references:
      stride: [tampering]
      cwe: [CWE-494]
      mitre-attack: [T1195]

  - id: cloud-session-repudiation
    name: Therapy Session Repudiation
    description: |
      Insufficient audit logging allows denial of stimulation events or
      therapy sessions. Critical for clinical accountability, adverse event
      investigation, and regulatory compliance.
    taxonomy_references:
      stride: [repudiation]
      cwe: [CWE-778]

  # ============================================================================
  # Neural Data Repository Threats
  # ============================================================================
  - id: datastore-phi-exposure
    name: Neural PHI Exposure
    description: |
      Patient neural recordings exposed through misconfigured access controls
      or inadequate de-identification. Neural data combined with session
      metadata can re-identify patients even after pseudonymization.
    taxonomy_references:
      stride: [information-disclosure]
      cwe: [CWE-862, CWE-200]
      mitre-attack: [T1530]

  - id: datastore-recording-tampering
    name: Neural Recording Tampering
    description: |
      Modification of stored neural recordings to falsify therapy outcomes,
      alter research results, or hide evidence of adverse stimulation events.
    taxonomy_references:
      stride: [tampering]
      cwe: [CWE-862]
      mitre-attack: [T1565]

  # ============================================================================
  # Data Flow Threats
  # ============================================================================
  - id: dataflow-neural-mitm
    name: Neural Telemetry Man-in-the-Middle
    description: |
      Interception and modification of neural signals on the wireless link
      between headset and signal processor. Could alter decoded intent in
      real-time or inject false signals.
    taxonomy_references:
      stride: [tampering]
      capec: ["94"]
      mitre-attack: [T1557]

  - id: dataflow-command-injection
    name: Stimulation Command Injection
    description: |
      Malicious stimulation commands injected into the communication channel
      between decoder and stimulation controller, bypassing intent validation.
    taxonomy_references:
      stride: [tampering]
      cwe: [CWE-20]
      mitre-attack: [T1071]

  - id: dataflow-replay
    name: Neural Command Replay
    description: |
      Captured legitimate neural commands or stimulation sequences replayed
      to trigger actions without current patient intent, exploiting lack of
      temporal validation or nonce mechanisms.
    taxonomy_references:
      stride: [spoofing]
      capec: ["60"]
      mitre-attack: [T1078]
